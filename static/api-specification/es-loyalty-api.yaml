      description: >-
        - In its simplest form, this call replaces a known account card with a
        new digital card. The old card will be invalidated and the new card will
        have an ACTIVE status.

        - If the newLoyaltyId is specified, then the existing card is replace
        with a new physical (plastic) card using this card number.

        - Other than specifying the old card number, the request takes in a
        status to update the replaced card state. The update status must be one
        of the 3 end states for cards: DAMAGED, CANCELLED or LOST_OR_STOLEN. If
        the existing card is being replaced with a physical card, then the
        newLoyaltyId is specified as well.

        - The correlation ID used with the Start Session call will be used to
        identify the account and the card number to be replaced must be from the
        same account.

        - The card for a ghost or unregistered account may be replaced, but only
        when the configuration is set to "in transition" (when an initial data
        migration for a new client is in progress).
            

        ## Request


        ### Body


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | oldLoyaltyId | Unique identifier of the known card being replaced |
        Number |  |

        | status | The reason the known card is being replaced | String. Value
        is one of: "DAMAGED", "CANCELLED", or "LOST_OR_STOLEN" | Allows reasons
        for card replacements to be tracked |

        | newLoyaltyId | Unique identifier of the new replacement card. | String
        | Used only if the existing card is being replaced with a physical
        (plastic) card. |


        ## Response


