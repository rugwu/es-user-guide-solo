        default:
          description: 200 - Transaction History with Multiple transactionTypes
      tags:
        - Customer Experience API Suite
        - Transactions
      description: >-
        The Transaction History request parameters and request combine to
        provide a tailored response showing a specified number and/or date range
        of transactions or a specific transaction. The response includes
        detailed data about what occurred with each transaction.


        **Note:**


        The following types of transactions may or may not be shown in the
        transaction history response depending on configuration settings. The
        value of the `excludedTransactionTypes` object attributes determine
        whether void transactions and the related original transactions, audit
        transactions, or transactions which do not change the member's points
        will be shown in the response. For each of these types of transactions,
        if the value is set to true, this type of transaction _is not shown_ in
        the response; if the value is set to false, then this type of
        transaction _is shown_ in the response.


        - Audit transactions - `audit`
            
        - Void transaction - `voided`
            
        - Activity transactions with net zero points - `netZeroActivityTxns`
            

        **Query Parameters**


        You can add a query parameter to provide query information at the end of
        the request URL and refine your search.


        | **Parameter** | **Description** | **Format** | **Note** |

        | --- | --- | --- | --- |

        | limit | Maximum number of transactions to return in a page | Number |
        Default is 30. Maximum allowed is 150. |

        | transactionId | Transaction Id to start searching from | String |
        Normally, use the last transaction id in the previous page returned. If
        left blank, will search from the start of the first page. |

        | from | For a date range on which to search for transactions, this is
        the starting date of the range. | Number | Date/time is in milliseconds.
        If left blank, will start searching from the current moment. |

        | to | For a date range on which to search for transactions, this is the
        end date of the range. | Number | Date/time is in milliseconds. If left
        blank, will used the configured default maximum which is 1 year if not
        changed. If the requested date is further back than the configured
        default maximum, it will be modified to match that maximum. |

        | locale | Locale of the member and the transaction. | String, values
        currently supported are: "en-CA", "en-US" and "fr-CA"; "EN" and "FR" can
        be used as well, but only for the member record (on the account level) |
        Optional. Priority order: (1) this query parameter; (2) locale set on
        the account; (3) environment locale. If locale is not provided or is not
        a valid value, system default ("en-CA") is used. |

        | transactionType | Valid RequestAction which is configured in to be
        allowed in filters. | String | For example, "ADHOC_REDEEM"; see the
        RequestAction list below the Response section below to view all possible
        values, but note that the values available depend on configuration. |

        | externalTransactionID | Unique identifier used by the client for
        transactions. | String | Returns transactions that use that
        externalTransactionID. Must be non-empty (or returns an error). Value is
        not validated, so results may be an empty object if no matching
        transactions are found. |


        ## Request


        ### Path Variables


        - **CorrelationId**
            - Unique identifier for the session. Should match the one used in session start.
                

        ### Body


        This request does not have a body.


        ## Response


        An array of transactions. See Transaction Format below for more details
        on the various types of transactions that can be returned.


        | **Attribute** | **Definition** | **Format** | **Note** |

        | --- | --- | --- | --- |

        | transactions | Contains all of the historical transaction data. |
        Array | May contain one or many transactions |

        | TransactionID | Unique identifier for a transaction. | String |
        Typically equal to the sessionID |

        | AccountID | Unique identifier for related account. | String | The GUID
        must related back to an existing accountId. Anonymous transactions
        always have the accountId as "anonymous". This can change if the account
        this belongs to is merged. |

        | RequestAction | Identifies the type of transaction request. | Enum:
        See the list for RequestAction below this table. | If not eligible for
        base, then not eligible for bonus. For more information about the
        possible values, see the list Transaction RequestAction Types below this
        table. |

        | TransactionDate | Date/time when the transaction occurred in ISO 8601
        format. | String | As occurred at the POS or when the request was made
        by Console |

        | TransactionDateEpoch | Date/time when the transaction occurred in
        Epoch format. | Number | Date/time in milliseconds. Time zone is not
        needed as Epoch times are absolute and convertible to an time zone.
        Processed date will differ slightly from transaction date, markedly so
        in the case of SAF. If this date conflicts with the ISO date for any
        reason, this will be considered the accurate value. |

        | ProcessedDate | Date on which the transaction was processed. In ISO
        8601 format. | String |  |

        | ProcessEpoch | Date on which the transaction was processed in Epoch
        format. | Number | Date/time in milliseconds |

        | ExternalTransactionID | Unique identifier provided for this
        transaction by the client. | String | Optional; transactions can be
        sorted by TransacationDateEpoch descending (most recent are first in the
        list returned) |

        | MetaData | Returns metadata on the transaction re: account status and
        the reason for the transaction, SenderDetails or RecipientDetails for
        POINTS_TRANSFER transactions. | Object | Any extra information about the
        transaction. Usually this is where we include data about how the
        transaction was calculated, for example, if the account holder was
        allowed to earn or not. The next six fields are provided as examples. |

        | VoidMetaData | Contains data about a void ID and whether the void
        transaction and associated original transaction should be shown in the
        response. | Object | Contains voidId and isVoided |

        | voidId | Unique identifier for the void transaction | String |  |

        | isVoided | Specifies whether the void transaction and original
        transaction should be included in the response. | Boolean: true or false
        | If set to false, then the void transaction and associated original
        transaction are shown in the response; if false, they are not |

        | SessionIdentifierType | The type of identifier used to uniquely
        identify this session. | String | A value such as "LOYALTY_ID",
        ACCOUNT_ID", or "EXTERNAL_ID" |

        | SessionIdentifierValue | Unique value used to identify the session. |
        String | For instance, a loyalty card number or account number |

        | ExternalReferenceId | Reference used to identify the session
        externally to the system. | String |  |

        | LastActivityDateEpoch | The Last Activity Date (LAD) listed in Epoch
        format. | Number | Date/time in milliseconds |

        | ExpiryRule | Contains data about how points expiry is implemented. |
        Object | Contains count, unit, text, and metric |

        | count | Number of date units to expiry. | Number | Such as 1, 6, 12,
        or 24 to indicate that number of months |

        | unit | The type of unit used for expiry. | String | For instance,
        "MONTHS" |

        | text | A short explanation of the expiry rule. | String | For example,
        "3 MONTHS since LastActivityDateEpoch" |

        | metric | The metric upon which the expiry is based. | String | For
        instance, "LastActivityDateEpoch" |

        | SenderDetails or RecipientDetails | Exmple if required for a
        POINTS_TRANSFER transaction; provides non-PII sender information. |
        Object | Contains firstName, lastName, businessName, email, and
        postalCode |

        | firstName | First name of the sender or receiver. | String |  |

        | lastName | Last name of the sender or receiver. | String |  |

        | businessName | Business name of the sender or receiver. | String |  |

        | email | Email address of the sender or receiver. | String |  |

        | postalCode | Postal code of the sender or receiver. | String |  |

        | AccountStatus | Identifies the status of the account. | Enum:
        "ACTIVE", "INACTIVE", "DAMAGED" | Optional |

        | EligibleToEarn | Identifies whether the transaction was eligible to
        earn rewards. | Boolean: true or false | Optional |

        | LoyaltyStatus | Identifies the status of the account for the loyalty
        program. | Enum: "ACTIVE", "INACTIVE", "DAMAGED" | Optional |

        | POINTS_BANK_SOR | Whether ES Loyalty is the System of Record (SOR) for
        the transaction. | Boolean: true or false | Optional |

        | affectsBalance | Whether the transaction affects the rewards balance.
        | Boolean: true or false | Optional |

        | Reason | Identifies the reason for the transaction. | String | An
        example of a MetaData object attribute |

        | NetAmount | The net amount of points that were applied related to the
        transaction. | Integer Number |  |

        | NetAmountDollars | The net amount of dollars that were applied related
        tot the transaction. | Decimal Number | Currency formatting to two
        decimal points is enforced even if the number is not supplied in that
        form |

        | TransactionParts | Array of the types of balance adjustments done to
        an account resulting from the transaction. | Array | Contains action,
        partDetails (to attribute Agent below) or rewardDetails (attribute after
        Agent below), |

        | action | Describes the type of transaction. | String: For values, see
        the list below this table | See the list of TransactionParts Action
        Types below this table. |

        | partDetails | Contains details about the parts of the transaction. |
        Object | Contains some of the attributes below, as far as the Agent
        attribute. Note that if the action is "REDEEM", the description of the
        attributes in the partDetails object begins with Reservation below. |

        | rewardDetails | Contains details about the parts of the transaction. |
        Array containing object(s) |  |

        | offerRewards | Contains details about the parts of the transaction. |
        Array containing object(s) |  |

        | issuerId | Name or identifier for the issuer of the reward. | String
        |  |

        | rewardName | Name of the reward. | String |  |

        | rewardId | Unique identifier for the reward for this transaction part.
        | String |  |

        | amount | The amount for this part of the transaction. | Number |  |

        | accountType | The type of this part of the transaction. | String | For
        instance, "POINTS_TRANSFER" |

        | promotionHeadline | The promotional headlines used for the offer. |
        String |  |

        | pointsEarned | The points earned by fulfilling this offer. | Number | 
        |

        | rewardsEarned | Rewards earned by fulfilling this offer. | Number |  |

