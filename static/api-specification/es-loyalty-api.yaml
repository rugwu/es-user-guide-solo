              schema:
                type: object
                properties:
                  transactionId:
                    type: string
                  message:
                    type: string
              example:
                transactionId: 45b0aca9-759a-4a3239928c8e
                message: Redemption Successful.
        '400':
          description: 400 - Feature Not Enabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                  errorMessage:
                    type: string
                  errorCode:
                    type: string
              example:
                statusCode: 400
                errorMessage: ADHOC_REDEMPTION feature is not enabled.
                errorCode: INVALID_REQUEST
      tags:
        - Partner Programs API Suite
      description: >-
        ## Request


        This request is to redeem points of the members directly by the Partner.


        In the case of households, the redemption amount is provided
        proportionally from the contributors (including the initiator who is
        redeeming the points). All contributors have their account balances
        updated in accordance with the points they contributed and their Last
        Activity Date (LAD) is updated as well.


        If a contributor has a zero or insufficient redeemableAccountBalance to
        fulfill their contribution, then that contribution is distributed among
        the remaining contributors. There is a transaction cap on household
        redemptions and a daily redemption cap as well.


        Redemptions cannot be reserved or made using PHONE_NUMBER as the
        X-Identifier-Type on Start Session, so if it is used, an error message
        is returned.


        ### Body


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | correlationId | Unique identifier for the session | String | This has
        the same requirements of uniqueness as correlationId path variable in
        CUX and POS API calls. Mandatory |

        | identifierType | Type of identifier for looking up member’s account. |
        Enum, commonly-used values: EXTERNAL_ID, LOYALTY_ID, PARTNER_LINK_ID, |
        Mandatory |

        | identifierValue | Value of the identifier for looking up member’s
        account. | String |  |

        | businessUnit | The business unit to which this transaction should be
        associated with. It is also used for reward identifier lookup. | String
        | Mandatory |

        | externalReferenceId | Reference identifier of the associated
        transaction in “client’s system” | String | Optional |

        | reservationDetails | Details regarding redemption | Object | Mandatory
        |

        | reservationDetails.redemptionId | Redemption Identifier against which
        redemption will occur | String | For direct deposit to an account, this
        would be "REDEEM_DIRECT_DEPOSIT"; for redemption to a statement credit,
        "REDEEM_STATEMENT_CREDIT"; may also be another value such as
        "REDEEM_WITHOUT_FULFILLMENT" |

        | reservationDetails.reservationAmount | Amount to be redeemed | Integer
        | Needs to be a positive integer. Optional but either this or
        catalogueITems needs to be present. Both can be there at a time. |

        | reservationDetails.fulfillmentEmailKey | Provides an email key or
        identifier from the Email Address Book of alternative email(s) to notify
        in case of member redemption. | String | Must be valid value from Email
        Address Book |

        | reservationDetails.catalogueItems | Array of catalogueITems which
        correspond to some amount of points | \[object\] | Optional but
        mandatory if reservationAmount is not provided. |

        | reservationDetails.catalogueItems.id | Catalogue Item id as saved in
        system | String | mandatory |

        | reservationDetails.catalogueItems.quantity | Quantity of the catalogue
        item | Integer | default = 1 Optional |


        ## Response


        For hierarchy information, view the sample Response code.


        | **Attribute** | **Definition** | **Format** | **Note** |

        | --- | --- | --- | --- |

        | transactionId | GUID uniquely identifying the account | String |  |

        | message | Message indicating that the request was successfully
        processed. | String |  |

        | errorCode | Short code for the error | Number | Optional. Only if the
        request was rejected. |

        | errorMessage | Message briefly describing the error. | String |
        Optional. Only if the request was rejected. |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 Bad Request | correlationID is mandatory and required to be
        non-empty | MISSING_REQUIRED_FIELDS_ERROR | Body parameter correlationId
        is not provided. |

        | 400 Bad Request | businessUnit is mandatory and required to be
        non-empty | MISSING_REQUIRED_FIELDS_ERROR | Body parameter businessUnit
        is not provided. |

        | 400 Bad Request | identifierType is mandatory and required to be
        non-empty | MISSING_REQUIRED_FIELDS_ERROR | Body parameter
        identifierType is not provided. |

        | 400 Bad Request | identifierValue is mandatory and required to be
        non-empty | MISSING_REQUIRED_FIELDS_ERROR | Body parameter
        identifierValue is not provided. |

        | 400 Bad Request | reservationDetails is mandatory and required to be
        non-empty | MISSING_REQUIRED_FIELDS_ERROR | Body parameter
        reservationDetails is not provided. |

        | 400 Bad Request | Maximum allowed limit for reward amount that can be
        issued per transaction is 10000. | INVALID_REQUEST | Exceeded maximum
        allowed limit of reward amount. |

        | 400 Bad Request | identifierType is mandatory and required to be
        non-empty. | INVALID_REQUEST | IdentifierType is not provided. |

        | 400 Bad Request | ADHOC_REDEMPTION feature is not enabled. |
        INVALID_REQUEST | Adhoc Reward feature is not enabled. |

        | 400 Bad Request | IsLoyaltyIdentifier is disabled for this partner. |
        INVALID_REQUEST | identifierType PARTNER_LINK_ID can be used only if the
        associated Partner is configured with IsLoyaltyIdentifier": true |

        | 400 Bad Request | Partner ${partnerID} does not exist. |
        INVALID_REQUEST | Partner doesn't found for given partner_id. |

        | 400 Bad Request | Unknown loyalty identifier type provided. |
        INVALID_REQUEST | Identifier type is unknown or of type PHONE_NUMBER,
        which cannot be used for redemptions. |

        | 400 Bad Request | Reservation allowance exceeded. | INVALID_REQUEST |
        Daily redemption cap is exceeded |

        | 400 Bad Request | Insufficient Funds. | INVALID_REQUEST | If user or
        household has insufficient funds to redeem. |
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                correlationId:
                  type: string
                identifierType:
                  type: string
                identifierValue:
                  type: string
                businessUnit:
                  type: string
                externalReferenceId:
                  type: string
                reservationDetails:
                  type: object
                  properties:
                    redemptionId:
                      type: string
                    reservationAmount:
                      type: integer
                    catalogueItems:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
            example:
              correlationId: '{{correlation_id}}'
              identifierType: PARTNER_LINK_ID
              identifierValue: 56701561-0749-4c9e-b1f3-90d08c7c1c95
              businessUnit: BUYCO
              externalReferenceId: 123_reference_id_internal_to_PC
              reservationDetails:
                redemptionId: ADHOC_REDEEM_2
                reservationAmount: 25000
                catalogueItems:
                  - id: ITEM_1
                  - id: ITEM_2
                    quantity: 3
    parameters:
      - name: partner_id
        in: path
        required: true
        schema:
          type: string
        example: '{{partner_id}}'
  /client/partners/{partner_id}/void:
    post:
      summary: Void Transaction
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: Bearer {{currentAccessToken}}
      responses:
        '400':
          description: 400 - Void Not Allowed
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                  errorMessage:
                    type: string
                  errorCode:
                    type: string
                  comment:
                    type: string
              example:
                statusCode: 400
                errorMessage: Void transactions not supported
                errorCode: INVALID_REQUEST
                comment: Void transactions are not enabled.
        default:
          description: 200 - Void Transaction
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionId:
                    type: string
                  message:
                    type: string
              example:
                transactionId: 331e16e9-b58e-5480309db0ce
                message: Successful void transaction
      tags:
        - Partner Programs API Suite
      description: >-
        This request completely voids a given transaction.


        ## Request


        ### Body


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | correlationId | Unique identifier for the session | String |
        Required.  <br>This has the same requirements of uniqueness as
        correlationId path variable in CUX and POS API calls. |

        | originalTransactionId | Original transaction ID | String | Required |

        | identifierType | Type of identifier for looking up member’s account. |
        Enum, commonly-used values: ACCOUNT_ID, EXTERNAL_ID, LOYALTY_ID,
        PARTNER_LINK_ID, EMAIL | Required |

        | identifierValue | Value of the identifier for looking up member’s
        account. |  | Required |

        | externalReferenceId | Reference identifier of the associated
        transaction in “client’s system” |  | Optional |

        | channel | Indicator for request source | Enum, commonly-used values:
        "STORE", "POS", "WEBSITE", "APP", "PARTNER" | Optional |


        ## Response


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | transactionId | Unique identifier for the void transaction | String | 
        |

        | message | Successful message | String |  |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 Bad Request | Void transactions not supported | INVALID_REQUEST |
        Void transactions are not enabled. |

        | 400 Bad Request | originalTransactionID is mandatory and required to
        be non-empty. | INVALID_REQUEST | Body parameter originalTransactionId
        is not provided. |

        | 400 Bad Request | correlationID is mandatory and required to be
        non-empty. | INVALID_REQUEST | Body parameter correlationId is not
        provided. |

        | 400 Bad Request | identifierType is mandatory and required to be
        non-empty. | INVALID_REQUEST | identifierType is not provided. |

        | 400 Bad Request | identifierValue is mandatory and required to be
        non-empty. | INVALID_REQUEST | identifierValue is not provided. |

        | 400 Bad Request | IsLoyaltyIdentifier is disabled for this partner. |
        INVALID_REQUEST | identifierType PARTNER_LINK_ID can be used only if the
        associated Partner is configured if IsLoyaltyIdentifier is set to true.
        |

        | 400 Bad Request | Partner {partnerID} does not exist. |
        INVALID_REQUEST | Partner not found for given partner_id. |

        | 400 Bad Request | Original transaction belongs to another member |
        INVALID_REQUEST | The original transaction provided belongs to another
        member. |

        | 400 Bad Request | Original transaction was already voided |
        INVALID_REQUEST | The given original transaction was already voided. |

        | 400 Bad Request | Void transaction not allowed | INVALID_REQUEST |
        Void is not allowed for the request action of the given original
        transaction. For example, void is allowed for ADHOC_REWARD and
        ADHOC_REDEEM transactions, but the original transaction has request
        action 'FINALIZE'. |

        | 400 Bad Request | Transaction is older than {{adjustmentPeriod}} days.
        | INVALID_REQUEST | The void transaction date is after the allowed
        adjustment period for the original transaction. |
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                correlationId:
                  type: string
                identifierType:
                  type: string
                identifierValue:
                  type: string
                originalTransactionId:
                  type: string
                externalReferenceId:
                  type: string
                channel:
                  type: string
            example:
              correlationId: '{{correlation_id}}'
              identifierType: ACCOUNT_ID
              identifierValue: 09ce5aaf-3839-46d3-b4b0-55425222226d
              originalTransactionId: '{{originalTransactionId}}'
              externalReferenceId: reference_to_get_PC
              channel: PARTNER
    parameters:
      - name: partner_id
        in: path
        required: true
        schema:
          type: string
        example: '{{partner_id}}'
