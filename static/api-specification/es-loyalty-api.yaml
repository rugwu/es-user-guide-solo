        - If the card is allocated to another account, the request is rejected
        (different loyalty id provided for change status call and start session
        call).
            
        - If the given loyaltyId is the primary card, LoyaltyStatus will be
        updated along with card status.
            
        - The above scenarios work for t1 (_inTransition_ = true) and t2
        (inTransition =false) period.
            
        - If the loyaltyId sent as identifier in the Session Start call is not
        valid (is not in the database), a ghost account is created, and then
        updating card status is performed.
            

