      description: >-
        ### **Description**


        Update marketing communication preferences for a member via email and/or
        SMS. The update only affects:


        - **Email**: LOYALTY preference
            
        - **SMS**: Default shortcode identifier
            

        ## Request Body


        ``` json

        {
          "email": {
            "preference": "OPT_IN"
          },
          "sms": {
            "preference": "OPT_OUT"
          }
        }

         ```

        ### Body


        | **Attribute** | **Description** | **Format** | **Note** |

        | --- | --- | --- | --- |

        | email | Used to set preference for email communication | Type -
        Object  <br>Optional | This affects "LOYALTY" |

        | email.preference | Value can be OPT_IN or OPT_OUT | Type - Enum 
        <br>Required if email is present |  |

        | sms | Used to set preference for SMS communication | Type - Object 
        <br>Optional | This affects default shortcode |

        | sms.preference | Value can be OPT_IN or OPT_OUT | Type - Enum 
        <br>Required if sms is present |  |


        ## Response


        | **Attribute** | **Description** | **Format** | **Note** |

        | --- | --- | --- | --- |

        | message | Returns results of marketing subscription update | String |
        Value: "Marketing subscription status updated." |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 Bad Request | Invalid preference option sent for {{channel}}. |
        INVALID_REQUEST | Must be OPT_IN or OPT_OUT and {{channel}} is email or
        sms. |

        | 400 Bad Request | Invalid communication channel present in the
        request: {{InvalidCommunicationChannel}}. | INVALID_REQUEST | Channel
        must be email or sms. |

        | 400 Bad Request | Preference for email is not sent in the request. |
        INVALID_REQUEST | There must be a valid preference, OPT_IN or OPT_OUT,
        in the email object. |

        | 400 Bad Request | Preference for sms is not sent in the request. |
        INVALID_REQUEST | There must be a valid preference, OPT_IN or OPT_OUT,
        in the sms object. |

        | 400 Bad Request | Either Email or SMS Preference is required. |
        INVALID_REQUEST | Request must include email or sms object with
        preference or both. |

        | 400 Bad Request | Account does not have an email for email
        communication. | INVALID_REQUEST | Email requires email address to
        change status. |

        | 400 Bad Request | Account does not have a phone number for sms
        communication. | INVALID_REQUEST | Account requires phone number for sms
        status change. |
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: object
                  properties:
                    preference:
                      type: string
                sms:
                  type: object
                  properties:
                    preference:
                      type: string
            example:
              email:
                preference: OPT_OUT
              sms:
                preference: OPT_IN
