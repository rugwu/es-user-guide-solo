              example:
                accountId: e93d2601-83cd-45b5-9116-f355b0f34d5f
                loyaltyId: '8350900001763283910'
                externalId: 537b1361-7707-4d32-92ee-c68cd1a9f213
                membershipType: R
                userStatus: ACTIVE
                cardStatus: ACTIVE
                isSuspended: false
                isExpired: false
                cardType: DIGITAL
                isValid: true
                pointsBalance: 109106
                dollarBalance: 43.64
                availablePointBalance: 109106
                availableDollarBalance: 43.64
                userMinRedeemPoints: 0
                userMinRedeemDollars: 0
                userMaxRedeemPoints: 0
                userMaxRedeemDollars: 0
                redeemablePointBalance: 0
                redeemableDollarBalance: 0
                sessionCorrelationId: c34cfb18-c4c1-4207-9e18-5494eebbc021
                userProfile:
                  dateOfBirth: '1999-09-25'
                  gender: M
                  firstName: SFMC
                  lastName: USER
                  businessName: SFMCUser
                  postalCode: M3K 1E7
                  email: languagePreference_4@gmail.com
                partners: {}
        '400':
          description: 400 - Session Must Point to an Existing Account
          headers:
            Date:
              schema:
                type: string
              example: Fri, 11 Jun 2021 01:52:49 GMT
            Content-Length:
              schema:
                type: integer
              example: '108'
            Connection:
              schema:
                type: string
              example: keep-alive
            x-amzn-RequestId:
              schema:
                type: string
              example: 5a2bf737-2978-4ea1-8a09-023cd4876287
            Referrer-Policy:
              schema:
                type: string
              example: no-referrer
            X-XSS-Protection:
              schema:
                type: string
              example: 1;mode=block
            Access-Control-Allow-Origin:
              schema:
                type: string
              example: '*'
            Expect-CT:
              schema:
                type: string
              example: max-age=86400
            Strict-Transport-Security:
              schema:
                type: string
              example: max-age=31536000
            Feature-Policy:
              schema:
                type: string
              example: vibrate 'none'; geolocation 'none'
            X-Frame-Options:
              schema:
                type: string
              example: sameorigin
            Content-Security-Policy:
              schema:
                type: string
              example: >-
                connect-src 'none';object-src
                https://*.cloudfront.net;script-src https://*.cloudfront.net
            x-amz-apigw-id:
              schema:
                type: string
              example: AvM9sFT4IAMF6rw=
            cache-control:
              schema:
                type: string
              example: no-cache, no-store, must-revalidate
            X-Content-Type-Options:
              schema:
                type: string
              example: nosniff
            X-Amzn-Trace-Id:
              schema:
                type: string
              example: Root=1-60c2c1f1-4ea10bc30313577a4c283a38;Sampled=0
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                  errorMessage:
                    type: string
                  errorCode:
                    type: string
                  comment:
                    type: string
              example:
                statusCode: 400
                errorMessage: Session must point to an existing account.
                errorCode: INVALID_REQUEST
                comment: >-
                  Heading parameter x-identifier-type is ACCOUNT_ID and the
                  informed identifier (account_id) is invalid
        '404':
          description: 404 - Invalid Phone Number
          headers:
            Date:
              schema:
                type: string
              example: Fri, 11 Jun 2021 01:51:28 GMT
            Content-Length:
              schema:
                type: integer
              example: '131'
            Connection:
              schema:
                type: string
              example: keep-alive
            x-amzn-RequestId:
              schema:
                type: string
              example: 3a8573db-64a4-4366-a1cd-b901970a640a
            Referrer-Policy:
              schema:
                type: string
              example: no-referrer
            X-XSS-Protection:
              schema:
                type: string
              example: 1;mode=block
            Access-Control-Allow-Origin:
              schema:
                type: string
              example: '*'
            Expect-CT:
              schema:
                type: string
              example: max-age=86400
            Strict-Transport-Security:
              schema:
                type: string
              example: max-age=31536000
            Feature-Policy:
              schema:
                type: string
              example: vibrate 'none'; geolocation 'none'
            X-Frame-Options:
              schema:
                type: string
              example: sameorigin
            Content-Security-Policy:
              schema:
                type: string
              example: >-
                connect-src 'none';object-src
                https://*.cloudfront.net;script-src https://*.cloudfront.net
            x-amz-apigw-id:
              schema:
                type: string
              example: AvMxGGyroAMFScQ=
            cache-control:
              schema:
                type: string
              example: no-cache, no-store, must-revalidate
            X-Content-Type-Options:
              schema:
                type: string
              example: nosniff
            X-Amzn-Trace-Id:
              schema:
                type: string
              example: Root=1-60c2c1a0-39dc0daa6122d05715e9ffe2;Sampled=0
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                  errorMessage:
                    type: string
                  errorCode:
                    type: string
                  comment:
                    type: string
              example:
                statusCode: 404
                errorMessage: >-
                  Could not start a session associated with the given Phone
                  Number.
                errorCode: INVALID_REQUEST
                comment: >-
                  Heading parameter x-identifier-type is PHONE_NUMBER and the
                  informed identifier was not found (either account or card).
        '500':
          description: 500 - Unexpected Error Occurred
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                  errorMessage:
                    type: string
                    format: style
                  errorCode:
                    type: string
                  comment:
                    type: string
              example:
                statusCode: 500
                errorMessage: >-
                  An unexpected error occured. Please report guid:
                  9f5bf324-5568-40df-b23b-1ae1c06ffb30
                errorCode: UNKNOWN
                comment: Report error with GUID number to your administrator.
      tags:
        - Customer Experience API Suite
        - Start Session
      security:
        - BearerAuth: []
      description: >-
        ## Request


        This request is used to begin a session with a customer account. A
        session is required for any API interaction outside of enrollment.


        ### Additional Headers


        **X-Identifier-Type**  

        Differentiates what type of identifier the path variable **identifier**
        is  

        Possible Values


        - ACCOUNT_ID
            
        - LOYALTY_ID
            
        - EXTERNAL_ID
            
        - EMAIL
            
        - PARTNER_LINK_ID
            
        - PHONE_NUMBER
            
        - EXTERNAL_AGENT_ID
            

        The default value for x-identifier-type (in the Headers) is ACCOUNT_ID.
        The default option is defined by a configuration in the configuration
        file (ConfigType='START_SESSION_CUX_IDENTIFIER'). 'LOYALTY_ID' and
        'ACCOUNT_ID' are allowed for most clients, and those as well as
        'EXTERNAL_ID' for a few clients.


        Redemptions cannot be made using PHONE_NUMBER as the X-Identifier-Type,
        so if it is used, then attributes for redeemable balances are returned
        in the response as "0" values.


        If EXTERNAL_AGENT_ID is used, it can be used with the
        externalAgentSessionId attribute in the request to provide the unique
        identifier.


        ### Path Variables


        **Identifier**  

        The identifier that points to the account for which the session is being
        opened.


        ### Body


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | correlationId | Unique identifier for the session | String |
        Recommended format is GUID. |

        | channel | Channel in which an offer was created | Enum, commonly-used
        values: "APP", "STORE", "POS", "PARTNER" or "WEBSITE" | Depending on
        client implementation, the default is "APP" or "STORE". Note that the
        client may supply their own custom value, but it cannot be null or
        blank. |

        | externalAgentSessionId | Unique identifier provided by the client. |
        String | Optional, GUID, can be used if enabled through configuration;
        also used with EXTERNAL_AGENT_ID x-identifier-type. |


        ## Response


        For hierarchy information, view the sample Response code.


        | **Attribute** | **Definition** | **Format** | **Note** |

        | --- | --- | --- | --- |

        | accountId | GUID uniquely identifying the account | String |  |

        | loyaltyId | Loyalty Card Number for the session | String (Client
        specific) | If loyaltyId was not provided in the request, then this is
        the primary card number on the account |

        | externalId | Primary identifier of the account holder in the client
        system | String | Optional, but can be configured to be a required
        field. Note that this identifier is not returned for accounts where the
        userStatus is "CLOSED", "CANCELLED", or "DECEASED". |

        | membershipType | Type of membership | Enum: Defaults: "R" or "E" | R =
        Regular, E = Employee. Note that through ConfigType='MEMBERSHIP_TYPES"
        in the configuration file, the letters used for these defaults can be
        changed. |

        | userStatus | Status of the loyalty account | Enum: "ACTIVE",
        "UNREGISTERED", "EXPIRED", "DECEASED", "CLOSED", or "CANCELLED" | Note
        that for a "ghost card" or unregistered card, the userStatus is
        "UNREGISTERED". |

        | cardStatus | Status of the loyalty card | Enum: "ACTIVE", "INVALID",
        "SUSPENDED", "LOST_OR_STOLEN", "DAMAGED", "FRAUD_ABUSE", "CANCELLED",
        "EXPIRED", or "NON_LOYALTY" | Always the status of the loyaltyId passed
        in. Note that for a card with an "UNREGISTERED" userStatus, this value
        is "NON-LOYALTY". |

        | cardType | Indicator for the type of card associated to the account |
        Enum: "DIGITAL" or "PHYSICAL" |  |

        | isSuspended | Indicates whether the account has a status of Suspended
        | Boolean: true or false |  |

        | isExpired | Indicates whether the account has a status of Expired |
        Boolean: true or false | Expiry due to long period of inactivity |

        | isValid | Valid session | Boolean | Legacy attribute. Value is always
        "true" |

        | pointsBalance | Customer's current points balance | Number |  |

        | dollarBalance | Customer's current dollar balance | Number |  |

        | availablePointsBalance | Customer's available points balance | Number
        | This is their balance less holds on their account. |

        | availableDollarBalance | User's available dollar balance | Number |
        This is their balance less holds on their account. |

        | userMinRedeemPoints | Minimum redemption (Points). | Number | The
        minimum number of points this user is able to redeem _this session_. If
        they are unable to redeem due to insufficient funds or other business
        rule violations, this value will be 0. |

        | userMinRedeemDollars | Minimum redemption (Dollars) | Number | The
        minimum redemption this user is able to perform expressed _this session_
        in dollar amount. If they are unable to redeem due to insufficient funds
        or other business rule violations, this value will be 0. |

        | userMaxRedeemPoints | Maximum redemption (Points). This is the number
        used to display the Redeemable Balance in the Console. | Number | The
        maximum number of points this user is able to redeem _this session_. If
        they are unable to redeem due to insufficient funds or other business
        rule violations, this value will be 0. |

        | userMaxRedeemDollars | Maximum redemption (Dollars). This is the
        number used to display the Redeemable Value in the Console. | Number |
        The maximum redemption this user is able to perform expressed _this
        session_ in dollar amount. If they are unable to redeem due to
        insufficient funds or other business rule violations, this value will be
        0. |

        | redeemablePointBalance | The balance that can currently be redeemed in
        points. | Number | This balance may be set to 0 if there is an
        outstanding fraud prevention advice on redemption for this account. |

        | redempableDollarBalance | The balance that can be currently redeemed
        in dollars. | Number | This balance may be set to 0 if there is an
        outstanding fraud prevention advice on redemption for this account. |

        | redemptionsToDate | Cumulative total of redemptions | Number | How
        many points the member has redeemed in the current YTD, including
        adjustments. The REDEEM_YEAR configuration must be turned on or this
        attribute will not appear. |

        | sessionCorrelationId | CorrelationId for the session. | String | This
        will always match the correlationId passed in the request. |

        | userProfile | Customer personal information | Object |  |

        | dateOfBirth | Customer date of birth | String | "YYYY-MM-DD" |

        | gender | Customer Personal Information | Enum: "M", "F", "Other",
        "PreferNotToSay" | Required attribute. M = 'MALE', F = 'FEMALE', Other =
        'Other', PreferNotToSay = 'PreferNotToSay'. |

        | firstName | Customer Personal Information | String | Optional
        attribute. Not returned if empty. |

        | lastName | Customer Personal Information | String | Optional
        attribute. Not returned if empty. |

        | businessName | Customer business name | String | Optional. Can be used
        in B2B loyalty programs |

        | postalCode/zipCode | Postal or Zip code of customer | String |
        Optional. Note that in LOCALIZATION config, if addressType is set to
        "US" then field name will be "zipCode" and if addressType is set to "CA"
        then the field name will be "postalCode". Format: "H0H 0H0" / "HOHOH" /
        "HOHOH-HOHO". |

        | email | Email of user | String | Required attribute. In standard email
        format. |

        | partners | Map of partner names or identifiers and the account
        holder’s link status for each listed partner and partner card details
        only for Non-Financial Partners. | Object | The name or identifier is an
        object containing the "status" and optional "links" attribute. The
        attributes below down to "bin" are contained in this object. |

        | {partnerName} | Usually an acronym for the partner name. | Object |  |

        | status | Whether the partner is linked or unlinked to the member
        account. | Enum: "LINKED" or "UNLINKED" | Only linked status
        (LINKED/UNLINKED) are returned for financial partners and unlinked
        partners. In addition to status, the list of linkIds and associated
        last4 and bin are returned for linked non-financial partners (bin may
        not always be included). |

        | links | If the status is "LINKED", may provide details about the link.
        | Array containing one or more objects, each containing the following
        three attributes | Returned for linked non-financial partners only. |

        | linkId | The unique identifier of the link. | String | Optional |

        | last4 | The last four digits of the linked card or account as an
        identifier. | String | Optional |

        | bin | The Bank Identification Number. | String | Optional |

        | membershipTiers | Contains detailed information about an accounts
        loyalty program tier information | Object | Optional. Array of loyalty
        programs. See the membershipTiers attribute table below. |

        | household | Contains information about a household or related group of
        members who may use combined rewards | Object | Contains the unique ID
        of the household, whether the current member is the "PRIMARY" member,
        and data about household balances and redeemable amounts |

        | id | Unique identifier for the household of members. | String |  |

        | role | The role within the household of the current member. | Enum:
        "PRIMARY" or "SECONDARY" |  |

        | balance | Contains information about the household account balance in
        dollars and points. | Object | Contains attributes with data about
        points and dollars balances, minimum and maximum redemption |

        | totalPointsBalance | The total number of points attributed to the
        household account. | Number |  |

        | totalDollarBalance | The total number of dollars attributed to the
        household account. | Number |  |

        | totalAvailablePointBalance | The total number of points currently
        available to the household account. | Number |  |

        | totalAvailableDollarBalance | The total number of dollars currently
        available to the household account. | Number |  |

        | totalRedeemablePointBalance | The total number of points that can
        currently be redeemed by this household account. | Number |  |

        | totalRedeemableDollarBalance | The total number of dollars that can
        currently be redeemed by this household account. | Number |  |

        | minRedeemPoints | The minimum number of points that can be redeemed by
        this household account. | Number |  |

        | maxRedeemPoints | The maximum number of points that can be redeemed by
        this household account. | Number |  |

        | minRedeemDollars | The minimum number of dollars that can be redeemed
        by this household account. | Number |  |

        | maxRedeemDollars | The maximum number of dollars that can be redeemed
        by this household account. | Number |  |


        #### membershipTiers


        For hierarchy information, view the sample Response code.


        | **Attribute** | **Definition** | **Format** | **Note** |

        | --- | --- | --- | --- |

        | {{programName}} | Name of the loyalty tier program | Object | The
        attribute name is assigned ID when creating the program. (eg.
        "GenericProgramName" would be the attribute). |

        | programCode | Identifier of the loyalty tier program | String |
