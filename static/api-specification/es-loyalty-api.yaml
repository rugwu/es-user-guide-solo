        quote. | INVALID_REQUEST | Card label needs to be in specified size and
        specific characters are allowed. |

        | 400 Bad Request | Error: Please provide CardLabel or ExtendedData |
        INVALID_REQUEST | Either "cardLabel" or "extendedData" is mandatory in
        request body. |

        | 400 Bad Request | Error: LoyaltyId specified is not associated with
        this Account | INVALID_REQUEST | The loyaltyId provided in Path Variable
        needs to be for the same account who is requesting the API. |
