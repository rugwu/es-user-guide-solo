        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | accountID | The accountId for which association was created for. |
        String |  |

        | associationKey | Concatenation of the Type and Value returned. |
        String |  |

        | associationType | Type of the association | String |  |

        | associationValue | Value of the association | String |  |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 Bad Request | Account Association feature is not supported. |
        INVALID_REQUEST | A valid request to created association but the feature
        is disabled. |

        | 400 Bad Request | SHIP_TO association type is not valid. |
        INVALID_REQUEST | A request with associationType that is not configured
        in system. |

        | 400 Bad Request | Association already exists. | INVALID_REQUEST | A
        valid request to add more than one association which is invalid. |
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                associationType:
