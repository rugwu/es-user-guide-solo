  /client/users/{correlation_id}/void:
    post:
      summary: Void Transaction
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: '{{currentAccessToken}}'
      responses:
        '400':
          description: 400 - Void Not Allowed for Original Transaction's Request Action
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                  errorMessage:
                    type: string
                  errorCode:
                    type: string
                  comment:
                    type: string
              example:
                statusCode: 400
                errorMessage: Void transaction not allowed
                errorCode: INVALID_REQUEST
                comment: >-
                  Void is not allowed for the request action of the given
                  original transaction. For example, void is allowed for
                  ADHOC_REWARD and ADHOC_REDEEM transactions, but the original
                  transaction has request action 'FINALIZE'.
        default:
          description: 200 - Void Transaction
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionId:
                    type: string
                  message:
                    type: string
              example:
                transactionId: 331e16e9-b58e-4c62-a606-5480309db0ce
                message: Successful void transaction
      tags:
        - Customer Experience API Suite
        - Transactions
      description: >-
        This request completely voids a given transaction. Note that currently,
        only ADHOC_REWARD and ADHOC_REDEEM transaction types can be voided.


