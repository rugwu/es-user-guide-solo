        ## Transaction Format


        ### Transaction RequestAction Types


        - ACCOUNT_EXPIRY - Points clawed back due to account-level expiry.
            
        - ACTIVITY - Points awarded due to activity that meets reward criteria.
            
        - ADHOC_REDEEM - Points redeemed for a member by a partner or business
        unit on an ad hoc basis.
            
        - ADHOC_REWARD - Points awarded by a partner or business unit on an ad
        hoc basis. This requestAction type is eligible for a void adjustment.
            
        - ADJUSTMENT - Points clawed back during an adjustment.
            
        - ADJ_NO_RECEIPT - Points clawed back during an adjustment that did not
        provide an original transaction.
            
        - BALANCE_UPDATE - Update on available balances.
            
        - CONFIRM_DELAYED_TRANSACTION - Confirmation for a transaction for which
        points are not awarded until another action such as payment takes place.
            
        - DISCRETIONARY - Points awarded through Discretionary processes such as
        Goodwill.
            
        - EXCHANGE - Points awarded through an exchange.
            
        - FIFO - Points removed from account due to First-In First-Out expiry or
        auto-redemption.
            
        - FINALIZE - Points awarded during a finalize transaction from the POS.
            
        - HISTORICAL_TRANSACTION - Points awarded historically prior to a data
        migration and brought into ES Loyalty through a client data sync API or
        through a feed generated using Snowflake data.
            
        - MERGE - Points transferred during a merge request.
            
        - POINTS_TRANSFER - Points tranferred from one account to another.
            
        - POST - Points posted to be awarded.
            
        - PPE - Points awarded through the post-purchase earn process after a
        transaction.
            
        - PROGRAM_REWARD - Reward issued through the program such as a referral
        reward.
            
        - PURCHASE - Points rewarded on a purchase transaction.
            
        - SAF - Points awarded as in a finalize, but not awarded immediately,
        for instance, due to a connectivity issue.
            
        - SCHEDULED_REDEEM - Points awarded for an automatically-scheduled
        redemption, such as a redemption at the end of a year or quarter.
            
        - TIER_REWARD - Points awarded for a particular member tier.
            
        - TRANSFER - Points transferred outside of a merge request (account to
        account with no victim).
            
        - TRIAL - Used internally, but Trial actions should never generate
        transactions to the DB.
            
        - UNKNOWN - Default Transaction Action Type. If used, something has gone
        wrong and the proper REQUEST_ACTION is not provided.
            
        - VOID - Points clawed back during a _full_ adjustment. This type of
        transaction may be shown or not shown in the transaction history
        depending on configuration.
            

        ### TransactionParts Action Types


        It is allowed for multiple parts to have the same type. This happens
        when they have different business units associated with them.


        - ADJUSTMENT - Adjustments to the members point balance.
            
        - BALANCE_UPDATE - Set up balances for incoming members or correct
        balance errors.
            
        - BASE - Base points earned.
            
        - BONUS - Bonus points earned (does not include Targeted Offers).
            
        - DISCRETIONARY - Discretionary points awarded.
            
        - EXPIRY - Points clawed back due to an expiry on the account or because
        the FIFO expiry date for points has been reached.
            
        - GAMEPLAY - To allow gameplay as an offer fulfillment reward; provides
        details about game awarded.
            
        - HOUSEHOLD_REDEEM - Points redeemed by the household to which a member
        belongs.
            
        - REDEEM - Points redeemed by member or auto-redeemed because the FIFO
        auto-redemption date has been reached.
            
        - TARGETED - Points earned for Targeted Offers.
            
        - TRANSFER_IN - Points transferred from another account through merger
        or transfer.
            
        - TRANSFER_OUT - Points transferred to another account through merger or
        transfer.
            

        ## Payment Provider Integrated


        If integration with a payment provider (for example, Tipalti) is
        enabled, then the following attributes are also included in the
        response. The first part of the PaymentDetails response contains data
        about the provider, payee, account, currency, etc. The second part
        (EventDetails) provides data about specific payment events in logged
        with the integrated payment provider.


        **Payment Details**


        | **Attribute** | **Definition** | **Format** | **Note** |

        | --- | --- | --- | --- |

        | PaymentDetails | Contains the details of a payment. | Array containing
        object(s) | Contains one object for each payment event returned. Each
        object contains the attributes below: EventDetails, EventDate,
        EventDateEpoch, EventType, EventName. |

        | Provider | The name of the payments provider. | String | For instance,
        "TIPALTI" |

        | EventDate | Date/time when the initial event occurred in ISO 8601
        format. | String |  |

        | EventDateEpoch | Date/time when the initial event occurred in Epoch
        format. | Number | Date/time in milliseconds. Time zone is not needed as
        Epoch times are absolute and convertible to an time zone. |

        | EventName | Name provided for the event to make it easy to recognize.
        | String |  |

        | EventType | Designates the type of event. | String | Possible values:
        ESL_REQUEST_SCHEDULED, ESL_REQUEST_SUBMITTED, ESL_REQUEST_ERROR (these
        are all ES Loyalty internal events); PAYMENT_SUBMITTED, PAYMENT_ERROR,
        PAYMENT_CANCELED, PAYMENT_COMPLETED, PAYMENT_DEFERRED (these are all
        payment provider events, in this case, for Tipalti) |

        | EventDetails | Contains details of a specific payment event. | Object
        | Attributes in EventDetails depend on the EventType. Based on the
        EventType, look below to find the related attributes. |

        | **EventType: ESL_REQUEST_SCHEDULED** |  |  |  |

        | ScheduledDate | Date for when the request is scheduled for submission.
        | String | Date/time in ISO 8601 format |

        | **EventType: ESL_REQUEST_SUBMITTED** |  |  |  |

        | PaymentCurrency | Identifier for the type of currency used for
        payment. | String | For example, "USD"; the currency is configured in
        the Adhoc Redemption Payment configuration |

        | ReferenceCode | Payment reference code received from the payment
        provider. | String | For instance: "mfp4abbulribpb3" |

        | PaymentAmount | Amount of this payment. | Number | Payment amount paid
        by the payment provider |

        | SubmissionDate | The date/time the request was submitted to the
        payment provider. | String | ISO 8601 format |

        | ExternalIdentifier | A unique identifier for client use, if any. |
        String |  |

        | BatchID | A unique identifier for a payment batch, if used for this
        payment. | String | Provided by the payment provider |

        | **EventType: ESL_REQUEST_ERROR** |  |  |  |

        | ErrorDescription | Description of the error preventing payment. |
        String |  |

        | ExternalIdentifier | Unique identifier used by the client, if
        required. | String |  |

        | PayeeID | Unique identifier for the payee. | String |  |

        | PayingEntityID | Unique identifier for the entity making the payment.
        | String |  |

        | PaymentAmount | The amount of the payment. | Number |  |

        | PaymentCurrency | The currency used for the payment. | String | For
        instance, "USD" |

        | **EventType: PAYMENT_SUBMITTED** |  |  |  |

        | SubmissionDate | Date/time at which the payment was submitted for
        processing. | String | ISO 8601 format |

        | **EventType: PAYMENT_ERROR** |  |  |  |

        | ErrorDescription | Description of the type of error. | String |  |

        | ErrorDate | Date/time at which the payment error occurred. | String |
        ISO 8601 format |

        | ErrorCode | Code associated with this type of error. | String |  |

        | **EventType: PAYMENT_CANCELED** |  |  |  |

        | CancelledDate | Date/time at which the payment was cancelled. | String
        | ISO 8601 format |

        | **EventType: PAYMENT_COMPLETED** |  |  |  |

        | CompletionDate | Date/time at which the payment was completed. |
        String | ISO 8601 format |

        | ProviderValueDate | Date/time at which the payment provider completed
        their payment process. | String | ISO 8601 format |

        | TransactionReference | Unique identifier for the transaction. | String
        |  |

        | **EventType: PAYMENT_DEFERRED** |  |  |  |

        | DeferredDate | Date/time at which payment was deferred. | String | ISO
        8601 format |

        | DeferredReasons | Contains reasons and associated codes for
        deferrment. | Array containing object(s) | Contains an object with each
        reasonDescription and reasonCode for deferrment |

        | reasonDescription | Reason for deferrment. | String | For instance,
        "Payee is suspended" |

        | reasonCode | Code associated with this reason for deferrment. | String
        |  |


        ## Error Responses


        See example documentation for possible error states.


        | **statusCode** | **errorMessage** | **errorCode** | **Notes** |

        | --- | --- | --- | --- |

        | 400 - Bad Request | Limit required to be a valid positive number |
        INVALID_REQUEST | Limit must be in proper format, that is, a positive
        number. |

        | 400 - Bad Request | Maximum allowed Limit is 150 | INVALID_REQUEST |
        Maximum allowed number of records returned was exceeded. |

        | 400 - Bad Request | Transaction Id required to be non-empty |
        INVALID_REQUEST | The transaction ID must be provided to retrieve a
        transaction. |

        | 400 - Bad Request | From date epoch should be a valid epoch. |
        INVALID_REQUEST | Make the From date a valid date in epoch format. |

        | 400 - Bad Request | To date should be a valid epoch. | INVALID_REQUEST
        | Make the To date a valid date in epoch format. |

        | 400 - Bad Request | From date should not be after To date. |
        INVALID_REQUEST | Make the From date before the To date. |

        | 400 - Bad Request | Transaction {transactionId} must be within
        {current date decreased by 100 days} to {currentDate} date |
        INVALID_REQUEST | The transaction date must be within the past 100 days.
        |

        | 400 - Bad Request | Maximum allowed Limit is 150 | INVALID_REQUEST |
        As per configuration, the maximum allow limit on transactions returned
        is 150 per system limits. |

        | 400 - Bad Request | Limit required to be a valid positive number |
        INVALID_REQUEST | The limit on results must be a valid positive integer.
        |

        | 400 - Bad Request | Transaction {transactionId} does not exist |
        INVALID_REQUEST | The transactionId provided does not exist in the
        system. |

        | 400 - Bad Request | Filtering by externalTransactionID is not enabled
        in TRANSACTION_ HISTORY config. | INVALID_REQUEST | Cannot use
        externalTransactionID as parameter in request because this feature is
        not enabled. |

        | 400 - Bad Request | External transaction Id required to be non-empty.
        | INVALID_REQUEST | There must be a value provided for
        externalTransactionID. Note that this value is not validated. |

        | 400 - Bad Request | Filtering by transactionType is not enabled. |
        INVALID_REQUEST | Cannot use transactionType as parameter in request
        because this feature is not enabled. |

        | 404 - Not Found | Transaction {transactionId} does not exist |
        NOT_FOUND | The transactionId provided as a query parameter in the
        request does not exist. |


