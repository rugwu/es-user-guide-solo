        This API can be used to get EMD from the account. The businessUnit is
        specified as a query parameter. If the businessUnit is not provided in
        the query parameters, then the default businessUnit for the loyalty
        program is used.


        Note the situation and error handling for this request:


        1. If businessUnit is invalid - An error is returned specifying that the
        provided business unit is not configured: {businessUnit}.
            
        2. If the proper configuration file is not created for that client -
        Return an empty object {}.
            
        3. If the account is closed - Return an empty object {}.
            
        4. If the proper configuration file is created - Return only allowed
        attributes for the passed or default BU.
            
        5. ExtendedData and SourceExtendedData allowed in the configuration file
        are returned in the response.
            

