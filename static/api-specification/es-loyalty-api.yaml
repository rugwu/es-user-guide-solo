      tags:
        - Customer Experience API Suite
        - Member Householding
      description: >-
        An administrator want to add households without creating an Invite
        object during the transition period (while member data is being
        migrated/synched) to the ES Loyalty platform. With _inTransition_ = true
        in configuration, the following takes place to establish a household and
        its members.


        This API will create the following objects:


        If the primary member is not a part of any household, the following
        actions take place behind the scenes:


        - Set up the HOUSEHOLD with Household ID(AccountID) = Primary member’s
        AccountID.

        - Create the PRIMARY member object.

        - Create the SECONDARY member object.
            

        If the primary member is part of a household, the following actions take
        place:


        - Create the SECONDARY member object
            

        This endpoint creates the necessary objects; no INVITE object is
        created. The request is rejected if _inTransition_ config is false.


        ## Request


        ### Path Variables


        - correlation_id

        - householdID
            

        ### Body


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | identifierType | Contains identifying information to be sent in the
        request. | ENUM: "LOYALTY_ID" or "EMAIL" |  |

        | identifierValue | Identifier value of the invitee. | String |
        Depending on identifierType selected, this is a valid email address or
        loyalty card number |


        ## Response


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | message | Generic response message | String | Contains success
        message: "The invitation has been sent successfully." |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 Bad Request | inTransition is not enabled. | INVALID_REQUEST | The
        configuration inTransition = false, so this request cannot be used to
        establish a household or add members. |

        | 400 Bad Request | Household Member Capacity Limit Exceeded |
        INVALID_REQUEST | The limit on the number of household members cannot be
        exceeded. |

        | 400 Bad Request | identifierType should be one of EMAIL, LOYALTY_ID. |
        INVALID_REQUEST | The identifierType must have a valid value. |

        | 400 Bad Request | Member already exist in the household. |
        INVALID_REQUEST | The request was made using CARD and the member already
        exists in the household. |

        | 400 Bad Request | Secondary member already exist in the household. |
        INVALID_REQUEST | The request was made using EMAIL and the member
        already exists in the household. |

        | 400 Bad Request | Member is already part of another household. |
        INVALID_REQUEST | The member is already part of a different household
        and cannot be added to this one. |
