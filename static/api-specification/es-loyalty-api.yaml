      description: >-
        Accepts or declines a given offer on behalf of a loyalty member; valid
        acceptance states are "ACCEPTED", "DECLINED", and "UNACCEPTED".


        ## Request


        ### Body


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | acceptanceState | Whether or not the offer has been accepted | Enum:
        "ACCEPTED", "NONE", or "COMPLETED" |  |


        ## Response


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | accountID | The ID of the account associated with the offer | String
        |  |

        | offerCode | Primary key that identifies the offer | String | Unique
        string value |

        | acceptanceDate | ISO-compliant date and time stamp when the offer was
        accepted | String |  |

        | acceptanceDateEpoch | Epoch date and time stamp of when the offer was
        accepted | Number | Epoch date and time are in milliseconds |

        | acceptanceState | Whether or not the offer has been accepted | Enum:
        "ACCEPTED", "NONE", or "COMPLETED" |  |

        | effectiveDate | Start date/time which the offer becomes live | String
        | Valid ISO date or date-time string |

        | expiryDate | Date/time which the offer expires | String | Valid ISO
        date or date-time string. If empty, the offer does not expire. |

        | effectiveDateEpoch | Epoch date and time stamp of when the offer
        started | Number | Epoch date and time are in milliseconds |

        | expiryDateEpoch | Epoch date and time stamp of when the offer expired
        | Number | Epoch date and time are in milliseconds |

        | version | Version of the offer | Number | Incremented every time the
        offer is updated |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 Bad Request | Acceptance state is invalid | INVALID_REQUEST |
        acceptanceState value must be 'ACCEPTED' or 'DECLINED' |

        | 400 Bad Request | Cannot change state of declined offer |
        INVALID_REQUEST | If a user has already decline an offer, the state
        cannot be changed |

        | 400 Bad Request | Cannot change state of a completed offer |
        INVALID_REQUEST | If a user has already accepted an offer, the state
        cannot be changed |

        | 400 Bad Request | Cannot accept {promoStatus} offer | INVALID_REQUEST
        | Provided offer has status different from 'ACTIVE' |

        | 400 Bad Request | Current date is after expiry date | INVALID_REQUEST
        | Provided offer is expired |

        | 400 Bad Request | Current date is prior to display date |
        INVALID_REQUEST | Provided offer is not yet displayed |

        | 404 Not Found | Targeted offer does not exist | PROMO_NOT_FOUND | The
        account was not targeted by the provider offerId |
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                acceptanceState:
                  type: string
            example:
              acceptanceState: ACCEPTED
