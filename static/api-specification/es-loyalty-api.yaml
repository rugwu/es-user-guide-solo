        Required. Contains one or more type of tender and details of each (as
        required). |

        | {tender_type} | Array containing one or more objects for a particular
        type of tender (such as "VISA" which replaces {tender_type}). | String
        for tender type name, then array containing an object for each instance
        of that tender type. | Contains idType to amount below. Possible values
        for {tender_type}: "CASH", "COUPON" (flyer coupon), "REWARDS"
        (non-points rewards), "AMEX", "MSTCARD", "VISA", "GWCOUP", "MCOUPON"
        (manufacturer's coupon), "LOYALTY" (points) |

        | total | Total of the sale transaction. | Object | Contains subTotal,
        totalSaleAmount, and taxAmount within each sale object type |

        | {transaction status type} | Status of transaction. | String | For
        example, "final"; contains totalSaleAmount, subTotal, and taxAmount
        below |

        | totalSaleAmount | The total amount of the sale including tax. | String
        |  |

        | subTotal | The total amount of the sale before tax. | String |  |

        | taxAmount | The tax generated on the sale. | String |  |

        | idType | Type of the card identifier being passed in. | String |
        Optional. "TOKEN", "LAST_4", etc. |

        | prefix | Prefix of the card identifier. | Number | Optional. Usually
        the BIN or first 6 digits of the card. Used for partner-based offers.
        This attribute is optional. |

        | suffix | Suffix of the card identifier. | Number | Optional. Usually
        the last 4 digits. Used for partner-based offers. |

        | amount | Total amount of the tender that was spent using this specific
        card/tender. | Number or String | Required. Total amount of the tender
        that was spent using this specific card/tender. |

        | LOYALTY | Reserved key that denotes in cents the dollars spent by
        exchanging for loyalty points. | Number | Optional. Used for
        redemption-based actions. |

        | REWARDS | Contains data about non-points rewards. | Object | Contains
        every non-points reward offer in this transaction. Contains {offer_name}
        to itemsAdjusted. |

        | {offer_name} | Contains details about one non-points reward offer. |
        String | Shows the quantity of the non-loyalty reward offer in dollars
        and whether it has been adjusted in the cart. Contains total and
        itemAdjusted below. |

        | total | The total amount of the non-points currency reward associated
        with the offer in cents. | Number or String |  |

        | itemsAdjusted | Gives the flexibility to the POS system to selectively
        choose to adjust the cart for some non-points offers and not for others.
        | Boolean | If true, the cart/item sale amounts are already adjusted
        using the non-points rewards amount and no further adjustment is
        required. The point-based cart evaluation proceeds. If false, promo but
        did not adjust the cart for that at the time of sending the request. The
        promo-engine will adjust the cart first and then do further evaluation
        of the points-based offers. |

        | stacking | Identification of a stacking group showing rewardsGroups
        associated with the transaction and the highest rewarding offer in that
        group (winningGroup). | Object | Optional. Contains information about
        the stacking group for the transaction. |

        | rewardsGroups | Identifies the rewards group(s) associated with the
        transaction. | Array | Contains the name(s) of the rewards group(s). |

        | winningGroup | Identifies the reward group that won the highest
        rewarding offer. | String | Contains the name of the winning group. |

        | receiptMessage | Message to show on the receipt. | String | The
        message may differ depending on points earned, redeemed, both, or
        neither. It may also be a generic message or specific to the client
        depending on configuration. |

        | message | Details of transaction not shown to consumer. | String |
        Provides information about the transaction and any redemptions. |

        | pointsBalance | Total number of points currently attributed to this
        account. | Number | Rewards balance in points. |

        | redeemableBalance | Maximum balance quantity in currency that can
        currently be redeemed | Number | An increment of a standard redemption
        amount. For instance, with a pointsBalance of 120000 and currency
        rewards of $10 per 25000 points, this value would be 40, or four
        increments of 10. |

        | redeemablePointBalance | Maximum number of points that can currently
        be redeemed. | Number | An increment of a standard redemption amount.
        For example, with a pointsBalance of 110000, the user may be able to
        redeem 100000, or four increments of 25000. |

        | household | Object containing information about the household to which
        the member belongs. | Object | Only returned if the member is a member
        of a household. |

        | id | Unique identifier for the household. | String |  |

        | role | The member's role in the household. | Enum: "PRIMARY" or
        "SECONDARY" |  |

        | balance | Object containing data about the balances available to the
        household. | Object |  |

        | totalPointsBalance | The total points balance of the household. |
        Number | The sum of all member balances. |

        | totalDollarBalance | The total dollar balance of the household. |
        Number | The sum of all member balances. |

        | totalAvailablePointBalance | The total points available to the
        household. | Number |  |

        | totalAvailableDollarBalance | The total dollars available to the
        household. | Number |  |

        | totalRedeemablePointBalance | The total number of points that can
        currently be redeemed by the household members. | Number |  |

        | totalRedeemableDollarBalance | The total number of dollars that can
        currently be redeemed by the household members. | Number |  |

        | minRedeemPoints | The minimum number of points that can be redeemed by
        the household. | Number |  |

        | maxRedeemPoints | The maximum number of points that can be redeemed by
        the household. | Number |  |

        | minRedeemDollars | The minimum number of dollars that can be redeemed
        by the household. | Number |  |

        | maxRedeemDollars | The maximum number of dollars that can be redeemed
        by the household. | Number |  |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 Bad Request | Session correlation ID does not exist--create it
        first. | INVALID_REQUEST | Create session correlation ID before sending
        this request. |

        | 400 Bad Request | Session Closed | INVALID_REQUEST | Cannot process
        this request because the session is closed. |

        | 400 Bad Request | Session Expired | INVALID_REQUEST | Cannot process
        this request because the session has expired. |

        | 400 Bad Request | Cart cannot contain zero-quantity line items |
        INVALID_REQUEST | Cannot process request when cart includes one or more
        line items with quantity of zero. |

        | 400 Bad Request | Invalid Extended data : Exceeded data size limit for
        extended data : {dataSize} Bytes | INVALID_REQUEST | When extendedData
        size exceeds the size limit. See the limit on ConfigType =
        EXTENDED_DATA, on Platform.DataSizeLimitInKb. |

        | 400 Bad Request | Invalid Extended data : Exceeded root level key
        limit for extended data : {numberOfKeys} keys | INVALID_REQUEST | When
        extendData exceeds number of attributes/keys limit. See the limit on
        ConfigType = ‘EXTENDED_DATA’, on Platform.TopLevelKeysLimit. |

        | 400 Bad Request | Anonymous users cannot redeem. | INVALID_REQUEST |
        When session is anonymous and it’s a redemption transaction. Member must
        be registered for redemption. |

        | 400 Bad Request | Invalid confirmation mode. | INVALID_REQUEST | When
        confirmation is informed on request’s body, but confirmation.mode is
        different from ‘CART’. |

        | 400 Bad Request | This card or user is not eligible for redemption. |
        INVALID_REQUEST | When it’s a redemption transaction and user is not
        eligible for redemption. |

        | 400 Bad Request | Invalid reservation Token provided. |
        INVALID_REQUEST | When it’s a redemption transaction and an invalid
        reservationToken is included in request body. |

        | 400 Bad Request | Reservation token has expired. | INVALID_REQUEST |
        When it’s a redemption transaction and an expired reservationToken is
        included in request body. |

        | 400 Bad Request | Products (or their quantities) do not match the
        Reservation request. | INVALID_REQUEST | Products used in the
        reservation request must be the same ones redeemed for. |

        | 400 Bad Request | Channel should be a string value. | INVALID_REQUEST
        | Cannot use data type other than string value for channel attribute.
        For example, channel attribute value cannot be a Boolean (rue, false, or
        null). |

        | 400 Bad Request | storeNumber is mandatory and required to be
        non-empty. | MISSING_REQUIRED_FIELDS_ERROR | A required attribute is
        missing from the request, or a required attribute has an empty value. |

        | 409 Conflict | Too many simultaneous requests for the same account. |
        CONFLICT_REQUEST | Reduce number of simultaneous requests. |

        | 500 Unexpected Error | An unexpected error occured. Please report
        guid: {{GUID}}. | UNKNOWN | An unexpected error has occured. Contact
        your Exchange Solutions representative with the GUID code above for more
        information. |
