        ## Request


        ### Path Variables


        {{cux_url}}/client/users/{{correlation_id}}/business/units/{{business_unit}}/links/{{link_id}}


        - **correlation_id**: This request requires an open session, which will
        point to the user account  

        - **business_unit**: Business Unit key  

        - **link_id**: a unique id for the link.


        ### Body


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | dateLinked | ISO-formatted date and time | String | Optional.
        Represents the date/time this link was created in the client system. If
        the status is UNLINKED, it represents the time it was removed from the
        client system. If not provided, assumed to be the current date/time of
        the request. |

        | status | Link status | String | Optional.  <br>LINKED (default if not
        provided) = account has been linked to that business unit.  <br>UNLINKED
        = Account was previously linked, but is no longer linked. |


