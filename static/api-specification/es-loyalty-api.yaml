        - Send Activity
      description: >-
        Sends an activity associated with a user.


        - No activityId is passed in, so a GUID will be generated.
            
        - If businessUnit is passed in, then offers that belong to that BU are
        evaluated. Otherwise, if no BU is passed in, offers belonging to any BU
        will be considered for evaluation.
            

        **Note**: A single session (correlationID) can process multiple
        activities.


        ## Request


        ### Body


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | action | The activity type that is being recorded | Enum: possible
        values include: "SURVEY_RESPONSE", "APP_DOWNLOAD", "APP_CHECKIN",
        "FIRST_TIME_LOGIN" | Note that "FIRST_TIME_LOGIN" must be used with the
        "APP" channel. |

        | channel | The channel associated with the activity | Enum,
        commonly-used values: "APP", "STORE", "POS", "PARTNER" or "WEBSITE" |
        Depending on client implementation, the default is "APP" or "STORE".
        Note that the client may supply their own custom value, but it cannot be
        null or blank. |

        | businessUnit | The name of the business unit the activity is being
        reported on for | String | Can be blank, but if no BU ID is passed in,
        then any offers belonging to any BU will be considered for evaluation |

        | note | Additional information about the activity performed | String | 
        |

        | when | ISO date representing when the activity was performed | String
        |  |

        | extendedData | Additional data about the activity | Array | May be
        useful for reporting and/or analytics. Note that contents are not
        validated, only top-level attributes are allowed, and only up to 20
        attributes with a max. size of 5KB are accepted. |

        | name | The name provided to an additional field of data | String |  |

        | value | The value provided for the additional field of data identified
        in the name attribute | String |  |


        ## Response


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | activityId | GUID associated with the activity sent | String |  |

        | type | The type of activity | String |  |

        | earned | The reward associated with the activity | Object | Total
        reward earned in this BU/partner category |

        | "XYZ" (name of the business unit or partner) | The business unit
        associated with the activity | Object | "XYZ" is replaced by the name of
        the relevant business unit |

        | "loyalty" (type of points awarded) | The type of rewards earned for
        the activity | Object | "loyalty" refers to points awarded |

        | base | Base points awarded for this activity | Number |  |

        | bonus | Bonus points awarded for this activity | Number |  |

        | targeted | Targeted points awarded for this activity | Number |  |

        | total | The total points awarded for this activity | Number |  |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 Bad Request | Provided business unit is not valid |
        INVALID_REQUEST | Business unit referenced is not a valid business unit
        |

        | 400 Bad Request | Provided businessUnit is disabled | INVALID_REQUEST
        | Business unit referenced is not enabled for use |

        | 400 Bad Request | LoyaltyId specified is not associated with this
        Account | INVALID_REQUEST | Loyalty ID referenced is not associated with
        the account |

        | 400 Bad Request | Channel not found | INVALID_REQUEST | A valid
        channel value was not included in the request Body |

        | 400 Bad Request | Action not found | INVALID_REQUEST | A valid action
        value was not included in the request Body |

        | 400 Bad Request | When not found | INVALID_REQUEST | A valid timestamp
        (when) value was not included in the request Body |

        | 400 Bad Request | Invalid transaction date | INVALID_REQUEST |
        Transaction date is invalid |
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                channel:
                  type: string
                businessUnit:
                  type: string
                note:
                  type: string
                when:
                  type: string
                extendedData:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
            example:
              action: SURVEY_RESPONSE
              channel: APP
              businessUnit: ''
              note: Filled in a survey
              when: '{{current_time}}'
              extendedData:
                - name: province_code
                  value: 'ON'
