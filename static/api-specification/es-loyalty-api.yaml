      tags:
        - Customer Experience API Suite
        - Member Management
      description: >-
        Used to suspend an account (SUSPEND) or to reinstate a
        previously-suspended account (REMOVE, remove the suspension).


        ## Request


        ### Body


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | action | Provides the action to either suspend or un-suspend an
        account. | String | Required. Either "SUSPEND" (to suspend account) or
        "REMOVE" (to remove a SUSPENDED status). |

        | reasonCode | Code that specifies the reason the suspension or the
        removal of a suspension is taking place. | String | Required. Valid
        values are: Used with SUSPEND: FRAUDULENT_BEHAVIOUR, SUSPECTED_FRAUD,
        POLICY_VIOLATION, EXCESS_OR_ABUSE, or OTHER. Used with REMOVE:
        LEGIT_BEHAVIOUR, ISSUE_RESOLVED, INVEST_INCONCLUSIVE, or OTHER. |

        | reason | User-friendly version of information about why the action is
        being taken. | String | Optional. Valid values: Used with SUSPEND:
        Fraudulent Behaviour, Suspected Fraud Behaviour, Policy Violation,
        Excessive or abusive account behaviour, or Other. Used with REMOVE:
        Legitimate Behaviour, Issue Resolved, Investigation Inconclusive, or
        Other. |

        | details | Provide additional information, up to 1,024 characters,
        about the action taken. | String | Optional |


        ## Response


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | message | Message regarding the outcome of the action to suspend or
        un-suspend an account. | String | For sucessful SUSPEND action: "The
        account is successfully suspended."  <br>For successful REMOVE action
        (remove a suspension): "The account is successfully suspended." |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 Bad Request | Suspension action is mandatory and required to be
        non-empty | MISSING_REQUIRED_FIELDS_ERROR | action either is not
        included in the request or has no value included. |

        | 400 Bad Request | Suspension reasonCode is mandatory and required to
        be non-empty | MISSING_REQUIRED_FIELDS_ERROR | reasonCode either is not
        included in the request or has no value included. |

        | 400 Bad Request | Suspension action must be a valid action. |
        INVALID_ACTION | The value for action is not valid (not SUSPEND or
        REMOVE). |

        | 400 Bad Request | Invalid reasonCode. Please specify a valid
        reasonCode. | INVALID_REQUEST | The value used for the reasonCode is not
        valid. See request documentation for valid reasonCodes for SUSPEND and
        REMOVE. |

        | 400 Bad Request | Invalid displayName. Please specify a valid
        displayName. | INVALID_REQUEST | reason (the displayName) does not have
        one of the specified values. To see values, view the documentation for
        reason in the request. |

        | 400 Bad Request | Suspension reasonCode length exceeded. |
        MAX_LENGTH_EXCEEDED | Max length is 20 characters. |

        | 400 Bad Request | Suspension reason length exceeded. |
        MAX_LENGTH_EXCEEDED | Max length is 40 characters. |

        | 400 Bad Request | Details length exceeded. | MAX_LENGTH_EXCEEDED | Max
        length is 1024 characters. |

        | 400 Bad Request | Account is already suspended. |
        ACCOUNT_ALREADY_SUSPENDED | Account already has SUSPEND status. |
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                reasonCode:
                  type: string
                reason:
                  type: string
            example:
              action: SUSPEND
              reasonCode: FRAUDULENT_BEHAVIOUR
              reason: Fraudulent Behaviour
    parameters:
      - name: correlation_id
        in: path
        required: true
        schema:
          type: string
        example: '{{correlation_id}}'
  /client/users/{correlation_id}/profile/closure:
    put:
      summary: Close Account with Options
      responses:
        default:
          description: 200 - Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: Account status updated successfully.
      tags:
        - Customer Experience API Suite
        - Member Management
      description: >-
        This API is used to close the account. It will close the account, cancel
        all cards and clean following things:


        - Household details
            
        - Partner Links
            
        - Terminate all cards
            
        - Extended Data
            
        - Save account closure object in account-history table
            

        The request also includes optional settings, where "zeroBalances" allows
        the account balance to be automatically deleted ("zeroed") and
        "anonymiseMemberData" allows masking the PII data in the account
        information. Both are "false" by default, but can be set to "true" to
        carry out the corresponding function. The response provides a success
        message for the operation.


        ## Request


        ### Body


        | **Attribute** | **Description** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | zeroBalances | Describes if we want to zero out the balances along
        with status change. It will create a discretionary transaction. |
        boolean: "true" or "false" | Optional, default value is "false" |

        | anonymizeMemberData | Describes if we want to mask the PII data of
        user. Also will set optIn status to declined and mask data to CBProfile
        Sync | boolean: "true" or "false" | Optional, default value is "false" |


        ## Response


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | message | If all clean up is done properly then "Account Status
        updated successfully" is sent in response. | String | If parts of clean
        up did not work, account status is still updated successfully, but the
        response message shows which parts failed. For example: "Account status
        updated successfully. Although following clean-up tasks failed: Member
        Profile Sync, Household Removal." |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 Bad Request | A Deceased or Closed Account cannot be made active
        again. | INVALID_REQUEST |  |
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                zeroBalances:
                  type: boolean
                anonymizeMemberData:
                  type: boolean
            example:
              zeroBalances: true
              anonymizeMemberData: true
    parameters:
      - name: correlation_id
        in: path
        required: true
        schema:
          type: string
        example: '{{correlation_id}}'
