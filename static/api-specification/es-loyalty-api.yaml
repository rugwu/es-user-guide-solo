        Created a new CUX API to Response the invitation of a Household


        - Create the Secondary member object if invitation **accepted**

        - Delete an INVITE object ( In both cases)
            

        ## Request


        ### Path Variables


        - correlation_id

        - householdID

        - inviterAccountID
            

        ### Body


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | status | Contains reply information for invitation | ENUM: "ACCEPTED"
        or "DECLINED" | Must contain one of these values |


        ## Response


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | message | Generic response message | String | Contains message: "The
        invitation has been accepted." or "The invitation has been declined." |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 | status required to be non-empty | INVALID_REQUEST | status is
        required field |

        | 400 | Could not find the Inviter Account. | INVALID_REQUEST | Inviter
        Account is not found |

        | 400 | Household Member Capacity Limit Exceeded | INVALID_REQUEST |
        Household member capacity limit is exceeded. |

        | 400 | Can not respond invite from an unregistered account. |
        INVALID_REQUEST | Inviter is unregistered user. |

        | 400 | Invitee Not Found. | INVALID_REQUEST | Can not find Invitee by
        provided details. |

        | 400 | Can not respond to invite you are already member of a household.
        | INVALID_REQUEST | Invitee already belongs to mentioned household |

        | 400 | Can not respond to invite, Inviter does not belongs to this
        household | INVALID_REQUEST | Inviter does not belongs to this household
        |

        | 404 Not Found | Config Not found | NOT_FOUND | Config does not exist
        in database. |

        | 404 Not Found | Household Template Not Found | NOT_FOUND | Household
        template does not exist. |
