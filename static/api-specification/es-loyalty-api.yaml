openapi: 3.0.0
info:
  title: Exchange Solutions ES Loyalty API Suites
  version: 1.0.0
  description: >-
    # Overview


    The Exchange Solutions ES Loyalty Platform has multiple API suites, each
    aimed at a different type of consumer.


    - **Customer Experience**: Use to power customer interactions by allowing
    users to view, edit or interact with profile and offer data.
        
    - **Point of Sale**: Use for primarily transactional interactions, such as
    at Retail Point of Sale or in online checkout experiences.
        
    - **Partner Programs**: Use to power links between the primary Loyalty
    Program and external partners. Ex: You might have a banking partner that
    wants to link their credit card to the Loyalty Program.
        

    # Using Postman Collection and Environments


    A sample environment file has been included in this collection. However in
    order to acquire valid values, please contact Exchange Solutions to acquire
    the necessary information for your environment(s).


    ## Required Environment Variables


    | Variable | Purpose | Format | Note |

    | --- | --- | --- | --- |

    | base_url | Root URL to which all API calls are made | URL | This will be
    combined with the environment name and the API suite ID to form the full
    base URL for each suite. |

    | env_name | Environment name or ID assigned to the instance of ES Loyalty
    to interact with | String |  |

    | authorization_url | Endpoint to request the Cognito Authorization Access
    Tokens | URL | ex:
    `https://client-prod.auth.us-east-1.amazoncognito.com/oauth2/token` |

    | clientId | ID Used for OAuth 2.0 Client Credentials Authentication |
    String | (!) Sensitive and confidential data! |

    | clientSecret | Passphrase used to OAuth 2.0 Client Credentials
    Authentication | String | (!) Sensitive and confidential data! |


    ## Automatically Managed Environment Variables


    Over the course of using this suite, some other variables will be captured
    to allow smooth transition from operation to operation. A non-exhaustive
    list follows:


    | Variable | Purpose | Format | Note |

    | --- | --- | --- | --- |

    | call_id | Request Identifier | GUID (suggested) String, 32+ characters
    long | The call ID is used to trace requests at the individual level,
    allowing even more granularity. Each call ID should be unique within the
    session it's used for. Where used, if not provided, ES Loyalty will generate
    and report using a GUID. |

    | correlation_id | Session Identifier | GUID (suggested) String, 32+
    characters long | The correlation ID is used to trace each requests made
    against sessions to our API suite. It is strongly suggested that it follow
    the [OWASP rules for session
    identifiers](https://cheatsheetseries.owasp.org/cheatsheets/Session_Management_Cheat_Sheet.html#session-id-length)
    This is also the value used to report on activity that occurred so that it
    can be correlated back to the calling system. Each session should have a
    globally unique session identifier, duplicates will be rejected. By default,
    this collection uses GUIDs and generates them automatically for each session
    |

    | currentAccessToken | OAuth 2.0 Access Token | [Standardized
    Format](https://www.oauth.com/oauth2-servers/access-tokens/) | A successful
    OAuth 2.0 session was created if this has a value, or the value changed. |


    ## Access Requirements


    Access is granted on a per-suite basis. It is recommended that each business
    unit obtain a separate grant (client id + secret) and keep it confidential.


    It is possible to have grants to multiple suites using the same credentials
    depending on the business case required. For example, an e-commerce site
    might use some of the profile management capabilities of the _Customer
    Experience_ suite while browsing and filling up their cart, while the
    checkout screen would interact with the _Point of Sale_ suite. In that case,
    it might make sense to grant both.


    To obtain an OAuth token, the client ID, client secret, and authorization
    URL are provided to you by Exchange Solutions and may then be used in a
    JavaScript HTTP POST request to get the token. In Node.js, a library like
    axios or fetch would be necessary to send the request, or the code could use
    XMLHttpRequest in a browser environment. Here is the JavaScript code:


    ``` javascript

    const path = "{auth URL}";

    const clientId = "{clientId}";

    const clientSecret = "{clientSecret}";

    const secret = btoa(clientId + ':' + clientSecret);

    const echoPostRequest = {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'Authorization': 'Bearer ' + secret,
        'cache-control': 'no-cache'
      },
      body: new URLSearchParams({
        'grant_type': 'client_credentials'
      })
    };

    // Send the request

    fetch(path, echoPostRequest)
      .then(response => response.json())
      .then(data => console.log(data))
      .catch(error => console.error('Error:', error));

     ```

    ### Currency Values


    **Note:** All currency attributes are to be sent to ES Loyalty in their
    penny value. eg. $54.23 should be sent as 5423.
servers:
  - url: '{{cux_url}}'
  - url: '{{cux_url}}url}'
  - url: '{{env_host}}'
  - url: '{{pos_url}}'
  - url: '{{partner_url}}'
paths:
  /client/users/{identifier}/sessions:
    post:
      summary: Start Session for User Account
      parameters:
        - name: Authorization
          in: header
          required: false
          deprecated: false
          schema: {}
          example: Bearer {{currentAccessToken}}
        - name: x-identifier-type
          in: header
          required: false
          description: >-
            LOYALTY_ID, ACCOUNT_ID, EXTERNAL_ID, EMAIL, PARTNER_LINK_ID,
            PHONE_NUMBER, or EXTERNAL_AGENT_ID
          deprecated: false
          schema: {}
          example: LOYALTY_ID
      responses:
        '200':
          description: 200 -  Using Loyalty ID
          headers:
            Date:
              schema:
                type: string
              example: Wed, 07 Aug 2024 07:22:40 GMT
            Content-Length:
              schema:
                type: integer
              example: '783'
            Connection:
              schema:
                type: string
              example: keep-alive
            x-amzn-RequestId:
              schema:
                type: string
              example: fc30acc6-7da9-4c93-9e02-c3abf22005a1
            Referrer-Policy:
              schema:
                type: string
              example: no-referrer
            X-XSS-Protection:
              schema:
                type: string
              example: 1;mode=block
            Access-Control-Allow-Origin:
              schema:
                type: string
              example: '*'
            MCK-APPID:
              schema:
                type: string
              example: ES-CB-V1
            MCK-MSGID:
              schema:
                type: string
              example: mck-c274b010-10b2-44fa-b104-3b56f5298f70
            Expect-CT:
              schema:
                type: string
              example: max-age=86400
            Strict-Transport-Security:
              schema:
                type: string
              example: max-age=31536000; includeSubDomains; preload
            Feature-Policy:
              schema:
                type: string
              example: vibrate 'none'; geolocation 'none'
            X-Frame-Options:
              schema:
                type: string
              example: sameorigin
            Content-Security-Policy:
              schema:
                type: string
              example: >-
                connect-src 'none';object-src
                https://*.cloudfront.net;script-src https://*.cloudfront.net
            MCK-MSGTIMESTAMP:
              schema:
                type: string
              example: August 7th 2024, 7:22:39
            x-amz-apigw-id:
              schema:
                type: string
              example: cIIN8FfloAMEQBw=
            cache-control:
              schema:
                type: string
              example: no-cache, no-store, must-revalidate
            MCK_CORRELATIONID:
              schema:
                type: string
              example: CORRELATION_ID_NOT_PROVIDED_IN_REQUEST
            X-Content-Type-Options:
              schema:
                type: string
              example: nosniff
            X-Amzn-Trace-Id:
              schema:
                type: string
              example: >-
                Root=1-66b320bf-080d9d7f3b858fee2e1ac98e;Parent=481020856d9b4f30;Sampled=0;lineage=bcf9a1b6:0
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountId:
                    type: string
                  loyaltyId:
                    type: string
                    format: utc-millisec
                  externalId:
                    type: string
                  membershipType:
                    type: string
                  userStatus:
                    type: string
                  cardStatus:
                    type: string
                  isSuspended:
                    type: boolean
                  isExpired:
                    type: boolean
                  cardType:
                    type: string
                  isValid:
                    type: boolean
                  pointsBalance:
                    type: integer
                  dollarBalance:
                    type: number
                  availablePointBalance:
                    type: integer
                  availableDollarBalance:
                    type: number
                  userMinRedeemPoints:
                    type: integer
                  userMinRedeemDollars:
                    type: integer
                  userMaxRedeemPoints:
                    type: integer
                  userMaxRedeemDollars:
                    type: integer
                  redeemablePointBalance:
                    type: integer
                  redeemableDollarBalance:
                    type: integer
                  sessionCorrelationId:
                    type: string
                  userProfile:
                    type: object
                    properties:
                      dateOfBirth:
                        type: string
                        format: date
                      gender:
                        type: string
                      firstName:
                        type: string
                      lastName:
                        type: string
                      businessName:
                        type: string
                      postalCode:
