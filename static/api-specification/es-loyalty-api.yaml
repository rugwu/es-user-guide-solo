  /client/users/{correlation_id}/partners/{partner_id}/links:
    post:
      summary: Manage Partner Links (Multiple Accounts)
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: Bearer {{currentAccessToken}}
      responses:
        '200':
          description: 200 - Maximum Failures
          content:
            application/json:
              schema:
                type: object
                properties:
                  PAYMENT_CARD:
                    type: object
                    properties:
                      success:
                        type: integer
                      unprocessed:
                        type: integer
                      unprocessedItems:
                        type: object
                        properties:
                          add:
                            type: array
                            items:
                              type: object
                              properties:
                                accountId:
                                  type: string
                                linkId:
                                  type: string
                                last4:
                                  type: string
                                  format: utc-millisec
                                metadata:
                                  type: object
                                  properties:
                                    cardType:
                                      type: string
                                    cardHolderType:
                                      type: string
                                reasonCode:
                                  type: string
                                reasonMessage:
                                  type: string
                  SOME_LINK:
                    type: object
                    properties:
                      success:
                        type: integer
                      unprocessed:
                        type: integer
                      unprocessedItems:
                        type: object
                        properties:
                          add:
                            type: array
                            items:
                              type: object
                              properties:
                                accountId:
                                  type: string
                                linkId:
                                  type: string
                                last4:
                                  type: string
                                  format: utc-millisec
                                metadata:
                                  type: object
                                  properties:
                                    cardType:
                                      type: string
                                    cardHolderType:
                                      type: string
                                reasonCode:
                                  type: string
                                reasonMessage:
                                  type: string
              example:
                PAYMENT_CARD:
                  success: 1
                  unprocessed: 6
                  unprocessedItems:
                    add:
                      - accountId: c23e1f4a-ef5e-9efc466b9186
                        linkId: 123456Token1234
                        last4: '1234'
                        metadata:
                          cardType: D
                          cardHolderType: Retail
                        reasonCode: LINK_LIMIT_MET
                        reasonMessage: Payment card has been linked to too many cards already
                      - accountId: e01a90d1-a178-6920a7caaf15
                        linkId: 111111Token1111
                        last4: '1111'
                        metadata:
                          cardType: D
                          cardHolderType: Retail
                        reasonCode: DUPLICATE_REQUEST
                        reasonMessage: Cannot process multiple requests for the same card.
                      - accountId: 5137c499-1433-3e50fea2b63e
                        linkId: 111111Token1111
                        last4: '1111'
                        metadata:
                          cardType: D
                          cardHolderType: Retail
                        reasonCode: DUPLICATE_REQUEST
                        reasonMessage: Cannot process multiple requests for the same card.
                      - accountId: 8ecd44c4-0131-24a325c58c1b
                        linkId: 222222Token2222
                        last4: '2222'
                        metadata:
                          cardType: D
                          cardHolderType: Retail
                        reasonCode: DUPLICATE_LINK
                        reasonMessage: Cannot process multiple requests for the same card.
                      - accountId: 407daba2-5c6d-d59e68b6a5d7
                        linkId: 222222Token2222
                        metadata:
                          cardType: D
                          cardHolderType: Retail
                        reasonCode: LAST4_REQUIRED
                        reasonMessage: >-
                          Last 4 must be provided for payment cards for this
                          partner
                      - accountId: invalidAccount
                        linkId: 123456Token1234
                        last4: '1234'
                        metadata:
                          cardType: D
                          cardHolderType: Retail
                        reasonCode: INVALID_ACCOUNT
                        reasonMessage: The provided account id does not exist.
                SOME_LINK:
                  success: 0
                  unprocessed: 1
                  unprocessedItems:
                    add:
                      - accountId: 4d0e3b68-8564-77c40390698b
                        linkId: 333333Token3333
                        last4: '3333'
                        metadata:
                          cardType: D
                          cardHolderType: Retail
                        reasonCode: UNSUPPORTED_LINK_TYPE
                        reasonMessage: Link type 'SOME_LINK' is not a supported link type.
        '400':
          description: 400 - Malformed Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                  errorMessage:
                    type: string
                  errorCode:
                    type: string
                  comment:
                    type: string
              example:
                statusCode: 400
                errorMessage: Request was malformed
                errorCode: MALFORMED_REQUEST
                comment: >-
                  The format of the request was not correct. Check for syntax
                  errors.
        '404':
          description: 404 - Invalid Base URL/Partner ID
          content:
            application/json:
              schema:
                type: object
              example: |-
                {
                    "statusCode": 404,
                    "errorMessage": "Partner "{{partner_id}}" cannot be found.",
                    "errorCode": "INVALID_PARTNER_ID"
                    "comment": "The partner_id provided in the request was not valid."
                }
      tags:
        - Customer Experience API Suite
        - Partner Program
      description: >-
        Allows external client to create one or more links to a single loyalty
        program for one or more accounts.


        **Note:** If there is an integration to send email notifications to the
        member based on partner linking/unlinking, those notifications will only
        be sent when the first card is linked and when the last card is
        unlinked.


        ## **Request**


        ### **Body**


        See example Request below to view hierarchy.


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | PAYMENT_CARD | Link-type map | Object | Note that this may be a
        different value for other link-type maps |

        | add, remove, or update | Type of operation on card | Enum: "add",
        "remove", or "update" | This array contains detailed information about
        each unprocessed record for this action |

        | accountId | Unique loyalty account identifier | String | GUID format |

        | linkId | External identifier | String | Required, needed to attempt a
        link. For instance, hashed payment card. |

        | bin | Bank identification number | Number, 6 digits | Optional |

        | last4 | Last 4 digits of the card number | Number, 4 digits |
        Required. Will not accept less or more than four digits. |

        | metadata | Additional information about card | Object | Optional,
        contains additional information such as cardType and cardHolderType |

        | cardType | Card type | String | "D" = debit, "C" = credit |

        | cardholderType | Card holder type | Enum: "Retail" or "Business" |  |


        ## **Response**


        View example response to see hierarchy.


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | PAYMENT_CARD | Link-type map | Object |  |

        | success | Number of items that were successful processed from the
        request | Number |  |

        | unprocessed | Number of items that were not successfully processed |
        Number |  |

        | unprocessedItems | Returns information about each item that was not
        processed | Object | Contains fields below |

        | {{operation}} | Type of operation on card | Enum: "add", "remove", or
        "update" | Array contains detailed information about unprocessed records
        |

        | accountId | Unique loyalty account identifier | String | GUID format |

        | linkId | External identifier | String | Required. For instance, hashed
        payment card. |

        | bin | Bank identification number | Number, 6 digits | Optional |

        | last4 | Last 4 digits of the card number | Number, 4 digits | Required
        |

        | metadata | Additional information about card | Object | Optional |

        | cardType | Card type | String | "D" = debit, "C" = credit |

        | cardholderType | Card holder type | Enum: "Retail" or "Business" |  |

        | reasonCode | Code for an update failure | Enum: "LINK_LIMIT_MET",
        "DUPLICATE_REQUEST", "DUPLICATE_LINK", "LAST_4_REQUIRED",
        "INVALID_ACCOUNT", or "UNSUPPORTED_LINK_TYPE",
        "ACCOUNT_STATUS_IS_CLOSED" |  |

        | reasonMessage | Detailed explanation of the reason for an update
        failure | String | For example: "The provided account id does not
        exist." |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 - Bad Request | Request was malformed | MALFORMED_REQUEST | The
        format of the request was not correct. Check for syntax errors. |

        | 400 - Bad Request | Cannot do more than 25 operation in a single
        request, you requested {{operations}}. | EXCEEDED_MAXIMUM_OPERATIONS |
        Break operations into multiple calls. |

        | 404 - Not Found | Partner {{partner_id}} cannot be found. |
        INVALID_PARTNER_ID | The partner ID provided in the request is not
        valid. |

        | 404 - Not Found | Account {{account_id}} cannot be linked. |
        CANNOT_LINK | An unregistered (ghost) account cannot be linked to a
        partner. |
    parameters:
      - name: correlation_id
        in: path
        required: true
        schema:
          type: string
        example: '{{correlation_id}}'
      - name: partner_id
        in: path
        required: true
        schema:
          type: string
        example: '{{partner_id}}'
