        | expiryDate | The date the issuance expires in ISO 8601 format. |
        String |  |

        | expiryDateEpoch | The date the issuance expires in epoch format. |
        Number | Date/time stamp in milliseconds |

        | redemptionDate | The date the issuance was redeemedin ISO 8601 format.
        | String |  |

        | redemptionDateEpoch | The date the issuance was redeemed in epoch
        format. | Number | Date/time stamp in milliseconds |

        | status | The current status of the issuance. | Enum: "AVAILABLE",
        "EXPIRED", "REDEEMED" |  |

        | rewardType | The type of reward used for the issuance. | Enum:
        "POINTS", "DOLLARS" |  |

        | rewardValue | The numeric value of the issuance. | Number |  |

        | extendedData | Additional data related to the issuance. | Object |  |

        | notes | Additional information about the issuance in very short form.
        | String | Only alphanumeric characters and symbols symbols allowed,
