        deleted, then the household is disbanded and deleted as it cannot
        function without a Primary member; a message is returned to indicate
        that the member has been deleted and the household disbanded. If a
        Secondary member is deleted, then the household remains intact; a
        message is returned indicating that the member was deleted.


        ## Request


        ### Body


        There is no body for this request.


        ## Response


        | Attribute | Description | Format | Note |

        | --- | --- | --- | --- |

        | message | Provides a message about the deletion of a Primary or
        Secondary member. | String | If the member was a Primary, the message
        also notes that the household has been disbanded. |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 Bad Request | Account is not part of a household | INVALID_REQUEST
        | The account indicated does not belong to a household. |
