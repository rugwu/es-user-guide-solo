              example: sameorigin
            Content-Security-Policy:
              schema:
                type: string
              example: >-
                connect-src 'none';object-src
                https://*.cloudfront.net;script-src https://*.cloudfront.net
            x-amz-apigw-id:
              schema:
                type: string
              example: AvKi6G1bIAMF7Sw=
            cache-control:
              schema:
                type: string
              example: no-cache, no-store, must-revalidate
            X-Content-Type-Options:
              schema:
                type: string
              example: nosniff
            X-Amzn-Trace-Id:
              schema:
                type: string
              example: Root=1-60c2be12-7b21746169689aa95a46ed7d;Sampled=0
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                  errorMessage:
                    type: string
                  errorCode:
                    type: string
                  comment:
                    type: string
              example:
                statusCode: 400
                errorMessage: Invalid Correlation ID
                errorCode: INVALID_REQUEST
                comment: Correlation ID is not a valid value
        "404":
          description: 404 - Phone Number Not Supported
          headers:
            Date:
              schema:
                type: string
              example: Fri, 11 Jun 2021 01:36:20 GMT
            Content-Length:
              schema:
                type: integer
              example: "88"
            Connection:
              schema:
                type: string
              example: keep-alive
            x-amzn-RequestId:
              schema:
                type: string
              example: 3cb52a71-ed24-48f9-834e-58c4ebaeb114
            Referrer-Policy:
              schema:
                type: string
              example: no-referrer
            X-XSS-Protection:
              schema:
                type: string
              example: 1;mode=block
            Access-Control-Allow-Origin:
              schema:
                type: string
              example: "*"
            Expect-CT:
              schema:
                type: string
              example: max-age=86400
            Strict-Transport-Security:
              schema:
                type: string
              example: max-age=31536000
            Feature-Policy:
              schema:
                type: string
              example: vibrate 'none'; geolocation 'none'
            X-Frame-Options:
              schema:
                type: string
              example: sameorigin
            Content-Security-Policy:
              schema:
                type: string
              example: >-
                connect-src 'none';object-src
                https://*.cloudfront.net;script-src https://*.cloudfront.net
            x-amz-apigw-id:
              schema:
                type: string
              example: AvKi6G1bIAMF7Sw=
            cache-control:
              schema:
                type: string
              example: no-cache, no-store, must-revalidate
            X-Content-Type-Options:
              schema:
                type: string
              example: nosniff
            X-Amzn-Trace-Id:
              schema:
                type: string
              example: Root=1-60c2be12-7b21746169689aa95a46ed7d;Sampled=0
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                  errorMessage:
                    type: string
                  errorCode:
                    type: string
                  comment:
                    type: string
              example:
                statusCode: 404
                errorMessage: >-
                  Could not start a session associated with the given phone
                  number.
                errorCode: INVALID_REQUEST
                comment: Account not found.
        default:
          description: 500 - Unknown Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                  errorMessage:
                    type: string
                    format: style
                  errorCode:
                    type: string
                  comment:
                    type: string
              example:
                statusCode: 500
                errorMessage: >-
                  An unexpected error occured. Please report guid:
                  a34615da-b43d-4eb3-a27d-7399059e0ff9
                errorCode: UNKNOWN
                comment: >-
                  An unexpected error occurred. Report the issue to your System
                  Administrator including the GUID code shown in the error
                  message.
      tags:
        - Point of Sale API Suite
        - Start Session
      security:
        - OAuth2: []
      description: >-
        Starts a new session for a specified loyalty account.


        The call initiates a user session and captures a correlationId, which
        will be used for all calls during the current user transaction. The
        correlationId is a unique identifier passed in the request body by the
        POS that can be used to recollect the transaction.


        This call also returns:


        - The account/card status and balance information for a Loyalty user.
            
        - The min and max value of user-specific redeemable points (and a dollar
        value is added as userMinRedeemDollars and userMaxRedeemDollars). If
        cardScanned is set to true in the request, and the LOYALTY_ID is used as
        the x-identifier-type in the request headers, then the current balances
        for userMin and userMax attributes for redemption are returned. If
        LOYALTY_ID is used, but cardScanned is set to false or is missing from
        the request, then the redeemablePointBalance and redeemableDollarBalance
        show the correct current values, but the userMax and userMin attribute
        values are set to zero. If a different x-identifier-type such as
        PHONE_NUMBER or EMAIL is used, but cardScanned in the request is set to
        true, then the redeemablePointBalance and redeemableDollarBalance show
        the correct current values, but the userMax and userMin attribute values
        are set to zero. If cardScanned is set to false for these identifier
        types, then userMin, userMax, and redeemable attribute values returend
        are zero.
            
        - The prompt/receipt message according to card/account status and
        swipes. For example, on a registered ACTIVE card, a prompt message is
        provided to be displayed to the member on a cadence set in the
        configuration file (say, once every three swipes) to ask the member: (1)
        to provide a phone number; (2) whether they want to opt in to email
        communications; or (3) whether they want to opt in to SMS
        communications. The prompt is only for those items they have not yet
        provided or opted in to.
            

        ## Request


        ### Additional Headers


        **X-Identifier-Type**


        - Differentiates what type of identifier is used for the path variable.
            
        - The configuration related to the identifier option is: ConfigType =
        'START_SESSION_POS_IDENTIFIER', attribute 'values'.
            

        **identifier** is


        Possible Values


        - LOYALTY_ID _(Default if not provided)_
            
        - EXTERNAL_ID
            
        - EMAIL
            
        - PARTNER_LINK_ID
            
        - PHONE_NUMBER
            

        By default, only LOYALTY_ID is allowed. Consult configuration options to
        turn on other options.


        Redemptions cannot be made using PHONE_NUMBER as the X-Identifier-Type,
        so if it is used, then attributes for redeemable balances are returned
        in the response as "0" values. If PHONE_NUMBER is used as the unique
        identifier for the Start Session call before this call, then all
        Redeemable Balances information for the household and for the account
        that initiated the session are shown as 0, as are redeemable balances
        for all other members. Redemptions cannot be made using PHONE_NUMBER as
        the X-Identifier-Type.


        ### Path Variables


        **Identifier**  

        The identifier that points to the account the session is being opened
        for.


        ### Body


        | **Attribute** | **Description** | **Format** | **Note** |

        | --- | --- | --- | --- |

        | correlationId | Unique identifier for the session | String |
        Recommended format is as GUID. |

        | cardScanned | Whether physical or digital card was presented at Point
        of Sale | Enum: "true" or "false" | true = card was presented, false =
        number was keyed in manually  <br />Based on program configuration, a card
        that was not scanned may limit some abilities of the session, such as
        limited redemption. |

        | locale | Locale of the member. | String, values currently supported
        are: "en-CA", "en-US" and "fr-CA"; "EN" and "FR" can be used as well,
        but only for the member record (on the account level) | Optional.
        Priority order: (1) this query parameter; (2) locale set on the account;
        (3) environment locale. If locale is not provided or is not a valid
        value, system default ("en-CA") is used. |

        | context | Contains details about the store involved. | Object |
        Optional. Contains one or more of the following attributes. |

        | channel | The channel for the transactions. | String | For instance,
        "STORE", "APP", etc. If the channel used is exempt or province/state is
        same as member, then an out-of-province block is not applied to
        redemption reservations. |

        | storeNumber | Unique identifier for the store involved. | String |
        Optional |

        | anonymousSessionId | This field will indicate whether the current
        session has transitioned from an anonymous session. If there is a
        transition from an anonymous to a loyalty session, this field will
        contain the session correlation ID from the anonymous session. This is
        useful for analytics. | String | Optional. The flag allows a special
        prompt to be displayed to members not using a loyalty card number to
        tell them the points they would have earned had they swiped. |


        ## Response


        To see the hierarchy, view the Example Response.


        | **Attribute** | **Description** | **Format** | **Note** |

        | --- | --- | --- | --- |

        | loyaltyId | Loyalty Card Number for the session | String (Client
        specific) | If loyaltyId was not provided in the request, then this is
        the primary card number on the account. |

        | employeeName | Identifies employee by name | String, null or name
        value | Only filled in if membershipType = "E"; otherwise, set to null |

        | membershipType | Type of membership | Enum: "R" or "E" | R =
        Regular/Retail  <br />E = Employee |

        | userStatus | Status of the loyalty account | Enum: "ACTIVE",
        "UNREGISTERED", "EXPIRED", "DECEASED", "CLOSED", "SUSPENDED", or
        "CANCELLED" |  |

        | cardStatus | Status of the loyalty card | Enum: "ACTIVE", "INVALID",
        "SUSPENDED", "LOST_OR_STOLEN", "DAMAGED", "FRAUD_ABUSE", "CANCELLED",
        "EXPIRED", or "NON_LOYALTY" | Always the status of the loyaltyId passed
        in. |

        | isSuspended | Marks the account as having been suspended | Boolean:
        true or false | If not present, assume false. |

        | isExpired | Marks the account as having been expired | Boolean: true
        or false | If not present, assume false. If the account meets the
        conditions of expiry (for example, there have been no activities for two
        years since the Last Activity Date), this flag is automatically set to
        "true" by the system and the points will be clawed back (set to zero in
        the pointsBalance and availablePointsBalance attributes). |

        | sessionStatus | Indicates the status of the current session | Enum:
        "OPEN" or "CLOSED" |  |

        | prompt | Prompt Code | String | What type of prompt is being returned.
        Can be empty. |

        | isValid | Valid session | Boolean | Legacy attribute - Always true. |

        | promptMessage | First part of Prompt Message | String. Example: "Your
        Loyalty Card is not registered. If you provide your email address, we
        will send you an email to assist you with your registration." | Message
        to display to user or POS agent. Can be empty. |

        | receiptMessage | Receipt Message (Prompt). | String | Prompt Message
        to print on their receipt if applicable. Can be empty. |

        | pointsBalance | User's current points balance. | Number | This is the
        member's current points balance, including holds. This will be set to
        zero if the isExpired flag is true for this account. |

        | availablePointsBalance | User's available points balance. | Number |
        This is their balance less holds on their account. This will be set to
        zero if the isExpired flag is true for this account or if there is a
        Fraud Plus BLOCK advice on the account. |

        | userMinRedeemPoints | Minimum redemption (Points). | Number | The
        minimum number of points this user is able to redeem _this session_. If
        they are unable to redeem due to insufficient funds or other business
        rule violations, this value will be 0. |

        | userMaxRedeemPoints | Maximum redemption (Points) | Number | The
        maximum number of points this user is able to redeem _this session_. If
        they are unable to redeem due to insufficient funds or other business
        rule violations, this value will be 0. |

        | userMinRedeemDollars | Minimum redemption (Dollars) | Number | The
        minimum redemption this user is able to perform expressed _this session_
        in dollar amount. If they are unable to redeem due to insufficient funds
        or other business rule violations, this value will be 0. |

        | userMaxRedeemDollars | Maximum redemption (Dollars) | Number | The
        maximum redemption this user is able to perform expressed _this session_
        in dollar amount. If they are unable to redeem due to insufficient funds
        or other business rule violations, this value will be 0. |

        | redemptionRules | The program's redemption rules. | Object | Contains
        one or more of the attributes below from minRedeemPoints to currency |

        | minRedeemPoints | Redemption rule on the minimum number of points that
        can be redeemed in one transaction | Number |  |

        | minRedeemAmount | Redemption rule on the minimum amount of currency
        that can be redeemed in one transaction | Number |  |

        | maxRedeemPoints | Redemption rule on the maximum number of points that
        can be redeemed in one transaction | Number |  |

        | maxRedeemAmount | Redemption rule on the minimum amount of currency
        that can be redeemed in one transaction | Number |  |

        | redeemIncrementPoints | Redemption rule on the allowable points
        increment for redemption | Number |  |

        | redeemIncrementAmount | Redemption rule on the allowable currency
        increment for redemption | Number |  |

        | currency | The specified type of redemption | Enum: "VISA", "MC",
        "AMEX", "CASH", "LOYALTY", or "GIFTCARD" | Not used in instances where
        the redemption is always in LOYALTY points or dollars |

        | sessionCorrelationId | CorrelationId for the session. | String | This
        will always match the correlationId passed in the request. |

        | redeemablePointBalance | Maximum Account redemption (Points). Balance
        may be 0 if there is an outstanding fraud control advice on the account.
        | Number | The total amount a user can redeem based on their current
        balance.  <br />  <br />Ignores all rules other than increments (ex:
        redemption is valid in $10 chunks only, so an account with $55 in
        available points can only redeem $50).  <br />  <br />The value will be 0 if
        there is a Fraud Plus BLOCK advice on the account.  <br />  <br />By
        default, the number of points that are redeemable have a capped daily
        limit.  <br />  <br />You can choose to override this setting and let users
        to redeem their full points balance. Note that each user’s tier
        redemption cap will still apply when it comes to the number of points
        they can withdraw daily.  <br />  <br />Please contact your Account Manager
        to enable your preferred option. |

        | redeemableDollarBalance | Maximum Account redemption (Dollars).
        Balance may be 0 if there is an outstanding fraud control advice on the
        account. | Number | The total dollar amount a user can redeem based on
        their current balance.  <br />  <br />Ignores all rules other than
        increments (ex: redemption is valid in $10 chunks only, so an account
        with $55 in available points can only redeem $50).  <br />  <br />This value
        will be 0 if there is a Fraud Plus BLOCK advice on the account.  <br /> 
        <br />By default, the dollar amount that is redeemable has a capped daily
        limit.  <br />  <br />You can choose to override this setting and let users
        to redeem their full dollar balance. Note that each user’s tier
        redemption cap will still apply when it comes to the amount they can
        withdraw daily.  <br />  <br />Please contact your Account Manager to enable
        your preferred option. |

        | email | Email associated with the account | String | Email ID
        associated with the account. Will be empty if there is no email address
        associated with the account. |

        | receiptPreference | Customer's preferred method of receiving their
        receipt | Enum: Default is "UNKNOWN"; other values: "PRINT", "EMAIL",
        "PRINT_AND_EMAIL" | This indicates the customer's preferred method to
        get the store receipt. "UNKNOWN" = the customer has not yet chosen a
        preference. |

        | promptMessage2 | Shows dollar balance for ghost card | String | Used
        only if the ghost card has a balance; omitted if there is no balance |

        | partnerLinks | Include the details of the partners if partnerLinks are
        enabled and the other conditions in the Note to the right are also met |
        Object which contains array(s) of partnerLinks, each array for a
        different partner and containing the token required:  <br />"partnerLinks:
        {  <br />"MEGABANK" \[  <br />"111Token1234",  <br />\]  <br />} | Returns only
        if:  <br />\- Partner is not financial  <br />\- POS_CUSTOMIZATION config
        has partnerLinks is enabled  <br />\- Partner config has
        AllowAPIResponseAttributes -> POS -> startSession -> linkID enabled |

        | membershipTiers | Contains detailed information about an accounts
        loyalty program tier information | Object | Optional. Array of loyalty
        programs. See the membershipTiers attribute table below. |

        | household | Contains all information about the household. | Object |
        The attributes from this point on are only relevant if the member is a
        member of a household. |

        | id | Unique identifier for the household. | String |  |

        | formedDate | Date the household was formed in ISO 8601 format. |
        String | Optional |

        | balance | Contains information about household aggregated balance |
        Object |  |

        | totalpointsBalance | The total current point balance for the
