      description: >-
        *   Removes the reservation hold for the given reservation token, if the
        token has not already been consumed and belongs to the account
        identified by the session (referenced by the correlation id).

        *   Idempotent if the token does not exist or is owned by a different
        session.
            

        ## Request


        ### Body


        This Request does not have a Body.


        ## Response


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | status | Identifies the status of the redemption reservation to be
        invoked. | String | Value is always "CANCELLED" except for Error states
        |

        | reservationToken | Identifies the token used to reserve the
        redemption. | String |  |

        | sessionId | Used to identify the account session during which the
        redemption reservation is being cancelled. | String |  |


