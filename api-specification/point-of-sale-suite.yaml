        | 400 Bad Request | Session already exists | INVALID_REQUEST | Session
        was already in progress prior to this request |

        | 404 Not Found | Could not start a session associated with the given
        LoyaltyID | INVALID_REQUEST | Either: (1) account not found; or (2) card
        is not found and identifier is not EXTERNAL_ID |
