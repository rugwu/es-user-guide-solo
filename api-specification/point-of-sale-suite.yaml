      tags:
        - Point of Sale API Suite
        - Redemption
      description: >-
        - This API will update the existing reservation.
            
        - The number of points reserved in the update cannot be greater than the
        number in the original redemption reservation.
            
        - If the redeemer is not a member of a household: If the update
        decreases the reservation amount, then the difference in points is
        awarded back to the member's account. For instance, if the reserved
        amount for the original reservationToken was 25000 and the updated
        reservation is 20000, then 5000 points are added back into the member's
        available point balance.
            
        - If the redeemer is a member of a household: If the update decreases
        the reservation amount, then points are awarded back to each household
        member account in the same proportions by which they originally
        contributed points.
            

        Redemptions cannot be reserved, updated or made using PHONE_NUMBER as
        the X-Identifier-Type on Start Session, so if it is used, an error
        message is returned.


        ### Body


        | **Attribute** | **Description** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | reservationAmount | Specifies the number of reward units to reserve
        for redemption | Number |  |

        | redemptionId | Optional  <br />  <br />Specifies against which redemption
        identifier we are reserving the points | String |  |

        | redeemerId | Optional  <br />  <br />It's mandatory if redemptionId is
        provided. Specifies the owner of the redemptionId and catalogueItems(if
        provided) | String |  |

        | catalogueItems | Optional  <br />  <br />If provided, redemptionId and
        redeemerId should be present.  <br />This represents the array of
        products/items which user wants to redeem.  <br /> 
        <br />catalogueItems\[\].#productCode: Corresponds to product which user
        want to redeem.  <br />  <br />catalogueItems\[\].#quantity: Corresponds to
        quantity of the productCode. Needs to be positive value. | Product
        objects within the catalogueItems array | For example:  <br /> 
        <br />"catalogueItems": \[  <br />{  <br />"productCode":"123xy"  <br />} 
        <br />{  <br />"productCode": "456za",  <br />"quantity":2  <br />}  <br />\] 
        <br />  <br />productCode is a string and quantity a number. If quantity is
        not included, it is assumed to be 1 for that productCode. |

        | extendedExpiry | Optional | Boolean | Extends the expiration duration
        of the existing reservation. |

        | offline | Optional | Boolean | If the reservation token does not
        exist, an offline attribute is passed as true, then a new reservation
        gets created. |

        | isExcludedFromCap | Whether the redemption is excluded from redemption
        caps (for example, the number of points that can be redeemed in a day).
        | Boolean: Enum: true or false |  |


        ## Response


        | **Attribute** | **Description** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | reservationToken | Token provided to confirm reservation status |
        String | Required for redemption requests |

        | reservationDuration | How long the reservation will be in place |
        Number |  |

        | availablePointBalance | Total number of points available for
        reservation | Number |  |

        | pointBalance | Total balance of points for this account | Number |  |

        | sessionId | Unique identifier for this session | String | GUID format.
        Optional attribute |

        | redemptionName | Optional  <br />  <br />Name of redemption identifier
        against which points are reserved.  <br />It is returned if it's item
        level redemption. | String |  |

        | catalogueItemsData | Optional  <br />  <br />Description of the items used
        for reservation of points. Returned only if request has item level
        redemption.  <br />  <br />productCode: Product code sent in the request. 
        <br />  <br />quantity: Quantity sent via request.  <br /> 
        <br />catalogueItemId: ID of the catalogueItem mapped to the product
        code.  <br />  <br />catalogueItemName: Name of the catalogueItem mapped to
        the product code.  <br />  <br />pointsAmount: pointsAmount which the
        catalogueItem corresponds to.  <br />  <br />totalPointsAmount: 
        <br />pointsAmount \* quantity  <br />  <br />messages : localized messages
        related to the catalogue item. | catalogueItemsData array containing
        product data objects | Example:  <br />  <br />{  <br />"catalogueItemId":
        "CATALOGUE_ITEM_ID_6199",  <br />"catalogueItemName": "Item Name 6199", 
        <br />"quantity": 5,  <br />"productCode": "89947774-01", 
        <br />"redemptionType": "TENDER",  <br />"pointsAmount": 500, 
        <br />"totalPointsAmount": 2500,  <br />"messages": {  <br />"en-CA": { 
        <br />"promptText": "Prompt for BUYCO 1",  <br />"receiptTextLong": "buyco
        2",  <br />"receiptTextShort": "buyco2"  <br />}  <br />}  <br />}  <br /> 
        <br />The pointsAmount is multiplied by the quantity to derive the
        totalPointsAmount. |

        | household | Contains the household pointsBalance and
        availablePointsBalance. | Object | Returned when member belongs to
        household and member has REDEEM privilege |

        | pointsBalance | Overall balance of points | Number |  |

        | availablePointsBalance | Points available for redemption | Number |  |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 Bad Request | Account is not eligible for redemption. |
        INVALID_REQUEST | Error shown if account cannot redeem or if
        PHONE_NUMBER is used as x-identifier-type in headers of Start Session
        call (not allowed). |

        | 400 Bad Request | Invalid tier amount. | INVALID_REQUEST | The tier
        amount referenced is not valid for that tier. |

        | 400 Bad Request | Either reservationAmount or catalogueItems is
        required. | INVALID_REQUEST | If both, reservationAmount and
        catalogueItems are absent in request. Either of them should be present.
        |

        | 400 Bad Request | redemptionId and redeemerId, both are required . |
        INVALID_REQUEST | If only one of redemptionId or redeemerId is provided.
        Both are allowed together or none of them should be present. |

        | 400 Bad Request | "invalidCatalogueItems": \[  <br />{ 
        <br />"productCode": "89947774-03",  <br />"quantity": -50  <br />},  <br />{ 
        <br />"productCode": "Invalid Product code",  <br />"quantity": 50  <br />} 
        <br />\] | INVALID_REQUEST | If productCode and quantity provided in
        catalogueItem is not valid. |

        | 400 Bad Request | "Reservation Token is invalid.", | INVALID_REQUEST |
        Reservation token does not exist and offline attribute is false. |

        | 400 Bad Request | Total points for catalogue items should be less than
        or equal to the reservation amount. | INVALID_REQUEST |  |

        | 400 Bad Request | New reservation amount cannot be greater than
        existing reservation amount. | INVALID_REQUEST |  |

        | 400 Bad Request | Invalid redemption identifier:
        INVALID_redemption_id. | INVALID_REQUEST |  |

        | 400 Bad Request | Invalid Redeemer | INVALID_REQUEST |  |

        | 400 Bad Request | Account is not eligible for redemption. |
        INVALID_REQUEST | Error shown if account cannot redeem or if
        PHONE_NUMBER is used as x-identifier-type in headers of Start Session
        call (not allowed). |

        | 400 Bad Request | Reservation belongs to a different session. |
        INVALID_REQUEST | If reservation is made using one x-identifier-type,
        then session is started again with a different x-identifier-type, this
        error is shown. |

        | 400 Bad Request | Invalid catalogue item(s). | INVALID_REQUEST |
        Specific errors in data for catalogue items are returned in the
        response. |

        | 400 Bad Request | Channel should be a string value. | INVALID_REQUEST
        | When channel not a string we will get this error. |
