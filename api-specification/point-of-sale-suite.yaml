        #### membershipTiers


        For hierarchy information, view the sample Response code.


        | **Attribute** | **Definition** | **Format** | **Note** |

        | --- | --- | --- | --- |

        | {{programName}} | Name of the loyalty tier program | Object | The
        attribute name is assigned ID when creating the program. (eg.
        "GenericProgramName" would be the attribute). |

        | programCode | Identifier of the loyalty tier program | String |
        Customized at time of program creation |

        | tierCode | Tier code of the accounts current tier | String |  |

        | tierName | Name or short description of the tier. | String |  |

        | tierRank | Numerical representation of the current tier rank | Number
        | Tier numbering starts at 0 |

        | tierContext | Identifies whether tier data applies to individual tier
        or household tier. | Enum: "INDIVIDUAL" or "HOUSEHOLD" | Only used when
        Household tier is enabled |

        | nextPeriodTierRank | Identifies the tier rank based on current
        contributions and the tier status rolled over from the last period (if
        enabled). | Number | Tier-related rank aligned to Code and Name below |

        | nextPeriodTierCode | Identifies the tier rank based on current
        contributions and the tier status rolled over from the last period (if
        enabled). | String | For example, "UNRANKED" or "GOLD" |

        | nextPeriodTierName | Identifies the tier rank or provides an
        explanatory message based on current contributions and the tier status
        rolled over from the last period (if enabled). | String | For instance,
        "Not yet qualified", "BRONZE", "SILVER", "GOLD", "TIER 1", "TIER 2",
        etc. |

        | achievedDate | Captures the date/time at which the current tier status
        was achieved or, if the status was rolled over at the beginning of the
        period, the beginning date of this period. | String | Subject to
        rollover configuration and subsequent adjustments, contributions, or
        redemptions. In the case of a household, a member joining or leaving the
        household may also change achievedDate if the new household balance
        causes a change in the household tier. |

        | nextTier | Map containing information for the accounts next tier |
        Object | Contains id, rank, and tierName |

        | id | System ID for next tier | String | Created when program is
        created |

        | rank | Numerical representation of the next tier | Number |  |

        | tierName | Client-defined tier name | String |  |

        | contributions | Details about an account tier contribution amounts |
        Object | Contains the spend object |

        | spend | Map of current tier and account spend information | Object |
        Contains total, next, and unused; use this or "next" |

        | unit | Map of current tier and account units purchased information |
        Object | Contains total, next, and unused; use this or "spend" |

        | next | Amount of spend required to reach the next tier | String |  |

        | total | Total amount of spend within the tier program period | String
        |  |

        | unused | Amount of spend towards the current tier | String |  |

        | businessUnits | List of all businessUnits participating in the program
        | String Array | The name of the businessUnit is in the array. |

        | dateRange | Defines range of the tier period | Object | Contains
        effective and expiry dates |

        | effective | Beginning of the tier period | String in ISO 8601 format
        |  |

        | expiry | End of the tier period | String in ISO 8601 format |  |

        | qualifyingBehaviourTypeLabel | Identifies the right behaviour to
        qualify. | String | For instance, "contributions" is set to "unit", then
        this attribute can identify the type of unit such as "Fuel" |

        | qualifyingCartSelectorDesc | Identifies the cart selector description
        corresponding to the label. | String | For example, if the above
        attribute is "Fuel", then this might be "Fuel Qualifying Product
        Description" |


