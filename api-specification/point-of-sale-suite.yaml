      tags:
        - Point of Sale API Suite
        - Transactions
        - Finalize
      security:
        - OAuth2: []
      description: >-
        This call sends a finalize activity associated with a user and returns
        the details regarding earning, redeeming, and offer rewards (point
        and/or non-point) the user has incurred with the purchase transaction.


        **Optional Parameter** - The callId can be optionally included to
        further specify the request that was made to the ES Loyalty Platform
        which flows through to reporting. It should be just as unique as the
        correlationId. If not provided, a GUID is generated in its place.


        In some cases, points can only be awarded after payment or fulfillment
        of the order have taken place, resulting in delayed transactions. Adding
        the following object to the end of the call supports a delayed
        transaction that requires confirmation.


        ``` json

        "confirmation": {
              "mode": "CART"
        }

         ```

        The response includes information about the confirmation status.


        ``` json

        "ConfirmationDetails": {
              "confirmed": true,
              "mode": "CART"
        }

         ```

        The tender object contains details about payment tender(s). Within the
        tender object, the tender type and value can be presented as a key:value
        pair or, if more data is required as with a payment card, in an array.
        There can also be a mixture of both types within the tender object.


        As a key:value pair:


        ``` json

        "tender": {
            "CASH": "200",
            "LOYALTY": 100
        }

         ```

        As an array:


        ``` json

        "tender": {
            "VISA": [
                {
                    "idType": "LAST_4",
                    "prefix": "12345",
                    "suffix": "1235",
                    "amount": "500"
                }
            }
        }

         ```

        **Note:** For a single members or in a household, if a redemption
        transaction begins, but one or more of the cards are subsequently set to
        a non-active state such as Suspended, Lost or Stolen, Fraud/Abuse,
        Cancelled, or Damaged before the redemption transaction is completed,
        then to prevent fraud, the redemption amount is still withdrawn from the
        single member or proportionally from all household members who had
        active cards before the redemption transaction began.


        ## Request


        ### Body


        | **Attribute** | **Description** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | action | Describes the action carried out by the Finalize request. |
        String | Required; for example, "PURCHASE" or "NON_POINT_REWARD" |

        | channel | Identifies the channel through which the action takes place.
        | Enum: "STORE", "POS", "WEBSITE", "APP", "PARTNER" | Required. Default
        is "POS". The client can set this value, but it cannot be null or blank.
        |

        | locale | Locale of the member. | String, values currently supported
        are: "en-CA", "en-US" and "fr-CA"; "EN" and "FR" can be used as well,
        but only for the member record (on the account level) | Optional.
        Priority order: (1) value from the POS system; (2) locale set on the
        account; (3) environment locale. If locale is not provided or is not a
        valid value, system default ("en-CA") is used. |

        | reservationToken | Uses a token for API requests that include reserved
        points. | String | Optional. See the Reserve for Redemption request. |

        | transactionDate | Timestamp for the transaction (date and time) in
        ISO-8601 format. | String | Required |

        | retailBanner | A store grouping or type. Transactions will default if
        a single BU or banner exists based on configuration. OAuth takes control
        of processing. | String | Optional |

        | storeNumber | Unique identifier for the store where the purchase
        transaction took place. | String | Required. Used for targeting,
        analytics, and support. |

        | tillNumber | Unique identifier for the till in the store at which the
        purchase transaction took place. | Number | Optional. Used for analytics
        and support. |

        | employeeCode | Unique identifier for employee who carried out the
        transaction. CSR of the transaction. | Number | This attribute is
        optional for operations but required for analytics. |

        | loyaltyId | Unique identifier for each member. | Number | Optional.
        This can be captured in the Start Session request. |

        | externalTransactionID | Unique identifier for transaction used by the
        client. | String | Optional. |

        | priceMatrix | Designates whether the transaction is retail or an
        employee purchase. | Enum: "R" or "E" | Required. "R" for retail, "E"
        for employee. |

        | locale | Used to change the receipt message language response for this
        transaction. Defaults to the client's chosen language when not present.
        | String, values currently supported are: "en-CA" and "fr-CA" as well as
        "EN" and "FR" | Optional. "en-CA" for English.  <br />"fr-CA" for French.
        |

        | callId | Unique request identifier. | String | Optional. Can be
        auto-generated if none provided. Supports tracking specific calls to be
        captured within a specific session for analytics. (Secondary Correlation
        ID). |

        | cart | Object containing array of saleLineItems | Object | Required.
        JSON Object containing array of saleLineItems. |

        | saleLineItems | Contains details of one transaction item. | Array |
        Required. JSON Object containing line items. See saleLineItems Details
        below this table |

        | subcategory | Same subcategory as in Product feed. | Number |
        Optional. Can be blank to force system to grab subcategory from product
        data. |

        | sku | The product identifier scanned at POS. | Number | Required |

        | quantity | Measure of product amount sold. | Number; for some clients,
        may include values confirmed to be as low as 0.000001 | Required. Can be
        partial value for unit of measure calculations where there is no
        directly-applicable SKU (for instance, rope sold by the foot). |

        | originalSaleAmount | The Manufacturer's Suggested Retail Price for a
        product. | Number | Required. Single-unit MSRP in pennies. |

        | subCategory | Identifier for the sub-category associated with the
        product. | String |  |

        | productName | Unique product name. | String |  |

        | saleAmount | MSRP less the discount, the actual sale price. | Number |
        Required. MSRP minus item discount in pennies. |

        | storeCoupon | Store-based coupon. | Number | Optional. This is
        informational only, no active discounting occurs in ESL. This attribute
        is optional. |

        | itemDiscount | Amount discounted. | Number | Optional. This attribute
        is optional. In pennies. |

        | mnfCoupon | Manufacturer Coupon. | Number | Optional. This is
        informational only, no active discounting occurs in ESL. This attribute
        is optional. |

        | promoCoupon | Flyer coupon. | Number | Optional. This is informational
        only, no active discounting occurs in ESL. This attribute is optional. |

        | itemTax | Tax on the item. | Number | Required. Tax on the line item
        in pennies. |

        | finalSaleAmount | Total sale amount for a specific product, the
        discounted price times the quantity purchased. | Number | Required.
        quantity \* saleAmount |

        | tags | To provide additional information | String | Required, but can
        be empty. |

        | rewardTags | To provide additional information about specified
        rewards. | Object | Required, but can be empty. Contains offer name(s)
        and associated reward(s) as key:value pairs. |

        | itemCost | Total cost for a specific product, the cost per unit times
        the quantity purchased. | Number | Optional. cost per unit \* quantity.
        This attribute is optional. |

        | couponCodes | Purchase-level coupons. | String | Optional. |

        | extendedData | Client keys needed for analytics of the transaction. | 
        | Optional. Maximum 1KB, 1 level deep, 10 keys maximum. |

        | totalSaleAmount | Total of all items sold on this transaction,
        including tax. | Number | Required. Summed up, tax included, total of
        all saleLineItems. In pennies. |

        | tender | JSON Object containing transaction tender used. | Object |
        Required. Contains one or more type of tender and details of each (as
        required). |

        | {tender_type} | Array containing one or more objects for a particular
        type of tender (such as "VISA" which replaces {tender_type}). | String
        for tender type name, then array containing an object for each instance
        of that tender type. | Contains idType to amount below. Possible values
        for {tender_type}: "CASH", "COUPON" (flyer coupon), "REWARDS"
        (non-points rewards), "AMEX", "MSTCARD", "VISA", "GWCOUP", "MCOUPON"
        (manufacturer's coupon), "LOYALTY" (points) |

        | idType | Type of the card identifier being passed in. | String |
        Optional. "TOKEN", "LAST_4", etc. |

        | prefix | Prefix of the card identifier. | Number | Optional. Usually
        the BIN or first 6 digits of the card. Used for partner-based offers.
        This attribute is optional. |

        | suffix | Suffix of the card identifier. | Number | Optional. Usually
        the last 4 digits. Used for partner-based offers. |

        | amount | Total amount of the tender that was spent using this specific
        card/tender. | Number or String | Required. Total amount of the tender
        that was spent using this specific card/tender. |

        | LOYALTY | Reserved key that denotes in cents the dollars spent by
        exchanging for loyalty points. | Number | Optional. Used for
        redemption-based actions. |

        | REWARDS | Contains data about non-points rewards. | Object | Contains
        every non-points reward offer in this transaction. Contains {offer_name}
        to itemsAdjusted. |

        | {offer_name} | Contains details about one non-points reward offer. |
        String | Shows the quantity of the non-loyalty reward offer in dollars
        and whether it has been adjusted in the cart. Contains total and
        itemAdjusted below. |

        | total | The total amount of the non-points currency reward associated
        with the offer in cents. | Number or String |  |

        | itemsAdjusted | Gives the flexibility to the POS system to selectively
        choose to adjust the cart for some non-points offers and not for others.
        | Boolean | If true, the cart/item sale amounts are already adjusted
        using the non-points rewards amount and no further adjustment is
        required. The point-based cart evaluation proceeds. If false, promo but
        did not adjust the cart for that at the time of sending the request. The
        promo-engine will adjust the cart first and then do further evaluation
        of the points-based offers. |


        ###### saleLineItem Details


        - Original Sale Amount = Original price per Unit
            
        - Sale Amount = Discounted price per Unit
            
        - Final Sale Amount = Discounted Price per Unit \* Quantity
            
        - itemCost = Cost per Unit \* Quantity
            

