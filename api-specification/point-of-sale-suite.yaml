      tags:
        - Point of Sale API Suite
        - Redemption
      description: >-
        Makes a reservation for a loyalty point redemption or item level
        redemptions. A token is received on the reservation, which must then be
        provided on the finalized activity call. The reservation will set the
        appropriate number of points aside (for a configured duration) so that
        the final redemption call is guaranteed to go.


        The API will do some validations on the request, namely verifying that
        redemption identifiers and the catalogue item identifiers are valid and
        calculating the total points to be reserved (when reservationAmount is
        not provided). Other validations ensure that the member has enough
        points to redeem and has valid account status. For valid requests, a
        Reservation item will be persisted and the reservation token will be
        returned in the response. No changes required in the response body.


        Reservations draw proportionally from the household members according to
        the number of points accrued to each. For instance, if 2,700 points are
        reserved, then Contributor A (accrued points: 15,000) may contribute
        1,500 points, Contributor B (accrued: 10,000) = 1,000, and Contributor C
        (accrued: 2,000) = 200 points.


        Points redemptions are first “reserved” before being processed to
        prevent customers from going into a negative balance state. In general,
        a reservation flow should follow:


        - Balance Inquiry
            
        - Redemption reservation
            
        - Transaction details exchange
            
        - Finalize transaction into a negative state.
            

        Redemptions cannot be reserved, updated or made using PHONE_NUMBER as
        the X-Identifier-Type on Start Session, so if it is used, an error
        message is returned.


        ## Request


        ### Body


        | **Attribute** | **Description** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | reservationAmount | Specifies the number of reward units to reserve
        for redemption | Number | Optional. If provided along with
        catalogueItems, only this number will be used. There will not be an
        internal points conversion for catalogue items. |

        | redemptionId | Specifies against which redemption identifier we are
        reserving the points | String | Used for reporting purposes to group
        relevant redemption transactions together.  <br />Optional if only
        reservationAmount is provided. Mandatory if catalogueItems is provided.
        |

        | redeemerId | Specifies the owner of the redemptionId and
        catalogueItems (if provided). | String | Optional if only
        reservationAmount is provided. Mandatory if catalogueItems and
        redemptionId provided. |

        | catalogueItems | Objects within an array of products/items for which
        user wants to redeem.  <br />  <br />Optional. If this is not provided, then
        reservationAmount must be provided. If provided, redemptionId and
        redeemerId should be provided.  <br />  <br />For each catalogue item,
        contains productCode (corresponds to product being redeemed for) and
        quantity (how many of that product; must be positive value; if not
        provided, assumed to be 1). | Product objects within the catalogueItems
        array | For example:  <br />  <br />"catalogueItems": \[  <br />{
        "productCode":"123xy"  <br />}  <br />{  <br />"productCode": "456za", 
        <br />"quantity":2  <br />}  <br />\]  <br />  <br />productCode is a string and
        quantity a number. If quantity is not included, it is assumed to be 1
        for that productCode. |

        | productCode | Corresponds to a product being reserved. Primary
        identifier for the product associated with a catalogue item being
        reserved. | String | Mandatory for any catalogueItem |

        | quantity | Quantity of the given catalogue item to be reserved.
        Default value is 1 if not provided. Must be a positive number. | Number
        | Example: Item is 1 can of soda which is internally mapped as 3000
        points. If quantity is provided as 3, total points to be reserved for
        this item will be 3x3000=9000 points. |

        | businessUnit | Provides the business unit to which this redemption
        refers (if there is more than one). | String |  |

        | isExcludedFromCap | Whether the redemption is excluded from redemption
        caps (for example, the number of points that can be redeemed in a day).
        | Boolean: Enum: true or false |  |


        ## Response


        | **Attribute** | **Description** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | reservationToken | Token provided to confirm reservation status |
        String | Required for redemption requests |

        | reservationDuration | How long the reservation will be in place |
        Number |  |

        | availablePointBalance | Total number of points available for
        reservation | Number |  |

        | pointBalance | Total balance of points for this account | Number |  |

        | sessionId | Unique identifier for this session | String | GUID format.
        Optional attribute |

        | redemptionName | Optional  <br />  <br />Name of redemption identifier
        against which points are reserved.  <br />It is returned if it's item
        level redemption. | String |  |

        | catalogueItemsData | Optional  <br />  <br />Description of the items used
        for reservation of points. Returned only if request has item level
        redemption. | Array containing product data objects. | Example:  <br /> 
        <br />"catalogueItemsData": \[  <br />{  <br />"productCode": "30370636-02", 
        <br />"quantity": 2,  <br />"catalogueItemId": "TOASTER",
        "catalogueItemName": "Toaster", "pointsAmount": 20000,
        "totalPointsAmount": 40000  <br />}  <br />\]  <br />  <br />The pointsAmount is
        multiplied by the quantity to derive the totalPointsAmount. |

        | productCode | Product code sent in the request. | String |  |

        | quantity | Quantity of the product sent in the request. | Number |  |

        | catalogueItemId | ID of the catalogue item mapped to the productCode.
        | String |  |

        | catalogueItemName | Name of the catalogueItem mapped to the product
        code. | String |  |

        | pointsAmount | Number of points corresponding to catalogueItem. |
        Number |  |

        | totalPoints Amount | Calculated: equals pointsAmount \* quantity |
        Number | Example: pointAmount for a can of soda is 3000 points, quantity
        is 3, then totalPointsAmount is 9000 points |

        | household | Contains the household pointsBalance and
        availablePointsBalance. | Object | Returned when member belongs to
        household and member has REDEEM privilege |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 Bad Request | Session started with email does not allow redemption
        | INVALID_REQUEST | If EMAIL is used as the x-identifier-type in Start
        Session query parameters, then redemption is not allowed |

        | 400 Bad Request | Based on the account and card status, user is not
        eligible for redemption | INVALID_REQUEST | When the user is not
        eligible to redeem. For example, when the account is suspended, or when
        the minimum spending threshold for redemption is not met. |

        | 400 Bad Request | Account is not eligible for redemption. |
        INVALID_REQUEST | Error shown if account cannot redeem or if
        PHONE_NUMBER is used as x-identifier-type in headers of Start Session
        call (not allowed). |

        | 400 Bad Request | Reservation allowance exceeded | INVALID_REQUEST |
        When the daily cap in dollars for redemption was achieved already. See
        configuration ConfigType = ‘REDEMPTION’, attribute ‘DailyRedemptionCap’
        |

        | 400 Bad Request | Insufficient Funds | INVALID_REQUEST | There are not
        sufficient rewards available to meet the requirements to reserve for
        redemption |

        | 400 Bad Request | LoyaltyId specified is not associated with this
        Account. | INVALID_REQUEST | The LoyaltyId provided cannot be reconciled
        with the AccountId for this Account. |

        | 400 Bad Request | Invalid tier amount. | INVALID_REQUEST | The tier
        amount referenced is not valid for that tier. |

        | 400 Bad Request | Catalogue item quantity is invalid. |
        INVALID_REQUEST | If quantity of a catalogueItem is negative or a
        string. |

        | 400 Bad Request | Either reservationAmount or catalogueItems is
        required. | INVALID_REQUEST | If both, reservationAmount and
        catalogueItems are absent in request. Either of them should be present.
        |

        | 400 Bad Request | redemptionId and redeemerId, both are required . |
        INVALID_REQUEST | If only one of redemptionId or redeemerId is provided.
        Both are allowed together or none of them should be present. |

        | 400 Bad Request | Product code: is invalid. | INVALID_REQUEST | If
        productCode provided in catalogueItem is not valid. |

        | 400 Bad Request | Total points for catalogue items for redemption
        cannot exceed the number of points reserved for redemption. |
        INVALID_REQUEST | Total points for catalogue item(s) for redemption
        cannot exceed the total number of points reserved for redemption. |

        | 400 Bad Request | Redeemer is not associated with Business Unit:
        {{businessUnit}}. | INVALID_REQUEST | Member requesting redemption is
        not associated with the correct business unit for this redemption. |

        | 400 Bad Request | Redeemer is not associated with Partner:
        {{partner_id}}. | INVALID_REQUEST | Member requesting redemption is not
        associated with the correct partner for this redemption. |

        | 400 Bad Request | Invalid catalogue item(s). | INVALID_REQUEST | One
        or more catalogue items included in reservation for redemption are not
        valid catalogue items.  <br />Any invalidCatalogueItems are shown as an
        array with the attributes productCode (string) and quantity (number) for
        each item with an invalid productCode. |

        | 400 Bad Request | Invalid catalogue item(s). | INVALID_REQUEST | The
        quantity of catalogue item(s) is not valid. The quantity must be a
        positive whole number.  <br />Any invalidCatalogueItems are shown as an
        array with the attributes productCode (string) and quantity (number) for
        each item with an invalid quantity. |

        | 400 Bad Request | Configured redemption logic is not supported. |
        INVALID_REQUEST | This should check only when member belongs to
        household and household template has invalid redemption logic
        configured. Currently, only PROPORTIONAL redemption logic is supported
        for this API request. |

        | 400 Bad Request | Sorry, you can not reserve points because of out of
        province/state block. | INVALID_REQUEST | The member cannot reserve for
        redemption if the state/province in which the store is located is
        different than their state/province of residence. This is due to a
        state/province block enabled in configuration. |

        | 400 Bad Request | Channel should be a string value. | INVALID_REQUEST
        | When channel value is not string we will get this error. |

        | 400 Bad Request | Unable to reserve points as reservation occurred in
        an ineligible location. | INVALID_REQUEST | For instance, the
        reservation attempt was from a province other than the member's province
        of residence AND the channel used in Start Session was not exempt from
        the out-of-province block. |

        | 409 Conflict | Too many simultaneous requests for the same account. |
        CONFLICT_REQUEST | FIFO sweep process for an account has been blocked
        because lock has been acquired for processing Reservation for
        Redemption. The event should be sent to the retry module, to be retried
        with exponential backoff. |
    parameters:
