      tags:
        - Point of Sale API Suite
        - Transactions
        - Confirm Cart Items or Delayed Transaction
      description: >-
        This API call provides confirmation details against a prior transaction
        that included a confirmation request.


        The mode parameter in the request indicates the type of confirmation
        provided (CART = Full Cart Confirmation).


        If after applying this confirmation the transaction is fully confirmed
        then ES Loyalty will remove any points on hold that are related to the
        original transaction making those points available to the account.


        Point balances are available via the member profile in ES Console, from
        the Start Session API response, or from the Balance Inquiry API
        response.


        ## Request


        ### Body


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | mode | Request for confirmation details for delayed transaction. |
        String. Always set to "CART". | Required |


        ## Response


        | **Attribute** | **Definition** | **Format** | **Notes** |

        | --- | --- | --- | --- |

        | message | Information about whether delayed transaction has been
        confirmed or not. | String | For example: "The transaction has been
        fully confirmed." |


        ## Error Responses


        | **statusCode** | **errorMessage** | **errorCode** | **Definition** |

        | --- | --- | --- | --- |

        | 400 Bad Request | Transaction does not exist | INVALID_REQUEST | No
        such transaction in the system |

        | 400 Bad Request | Transaction does not require confirmation |
        INVALID_REQUEST | Confirmation is not required for this type of
        transaction |

        | 400 Bad Request | Confirmation mode mismatch | INVALID_REQUEST | When
        confirmation mode informed in this request is different from
        confirmationMode of the original transaction |

        | 400 Bad Request | Transaction cannot be confirmed | INVALID_REQUEST |
        When no saleLineItems are provided |

        | 400 Bad Request | Transaction already confirmed | INVALID_REQUEST |
        The specified transaction has already been confirmed |
